name: Worker Cells — Metric Collectors

# Runs on every push to main
# 3 lightweight Python scripts that measure codebase health
# Output: .metrics/*.json files consumed by Product Mind
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  measure:
    name: "Collect Metrics"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Configure git
        run: |
          git config user.name "SiteSync Metrics"
          git config user.email "metrics@sitesync.ai"
          git config pull.rebase true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies (needed for eslint cell)
        run: npm ci

      - name: Run worker cells
        run: |
          python3 scripts/cells/count-type-issues.py
          python3 scripts/cells/count-quality-issues.py
          python3 scripts/cells/find-untested.py
          python3 scripts/cells/count-eslint-issues.py
          echo "=== Metrics collected ==="
          cat .metrics/type-issues.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Types: {d[\"totals\"]}')"
          cat .metrics/quality-issues.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Quality: {d[\"totals\"]}')"
          cat .metrics/untested-files.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Coverage: {d[\"coverage_pct\"]}%')"

      - name: Commit metrics (if changed)
        run: |
          git add .metrics/ 2>/dev/null || true
          CHANGES=$(git diff --cached --name-only | wc -l | tr -d ' ')
          if [ "$CHANGES" -gt "0" ]; then
            git commit -m "metrics: update codebase health [cells][skip ci]"
            # Rebase on latest main — retry with increasing delays
            for i in 1 2 3 4 5; do
              git fetch origin main 2>/dev/null
              git rebase origin/main 2>/dev/null || { git rebase --abort 2>/dev/null; git reset --soft HEAD~1; git stash; git pull origin main; git stash pop; git add .metrics/; git commit -m "metrics: update codebase health [cells][skip ci]"; }
              echo "Creating PR instead of direct push" && BRANCH="auto/metrics-$(date +%Y%m%d-%H%M)" && git checkout -b "$BRANCH" 2>/dev/null || true && git push origin "$BRANCH" 2>&1 && gh pr create --title "[auto] metrics update $(date +%Y-%m-%d)" --body "Worker cell metrics update" --base main --head "$BRANCH" || true 2>&1 && echo "Metrics pushed (attempt $i)" && exit 0
              echo "Push attempt $i failed, retrying in $((i*3))s..."
              sleep $((i*3))
            done
            echo "::warning::Could not push metrics after 5 attempts"
          else
            echo "No metric changes detected"
          fi
