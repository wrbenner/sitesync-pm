name: "Organism — Learn"

on:
  workflow_dispatch:
    inputs:
      experiment_json:
        description: "Experiment JSON (compact)"
        required: true
        type: string
      outcome:
        description: "Outcome: merged, failed, or closed"
        required: true
        type: choice
        options:
          - merged
          - failed
          - closed
      metrics_before:
        description: "Metrics before (JSON)"
        required: false
        type: string
        default: "{}"
      metrics_after:
        description: "Metrics after (JSON)"
        required: false
        type: string
        default: "{}"
      failure_reason:
        description: "Reason for failure (if failed)"
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  learn:
    name: Record experiment outcome
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse experiment data
        id: parse
        run: |
          EXP='${{ inputs.experiment_json }}'
          TITLE=$(echo "$EXP" | jq -r '.title // "Unknown experiment"')
          TARGET_FILE=$(echo "$EXP" | jq -r '.target_file // "unknown"')
          TARGET_METRIC=$(echo "$EXP" | jq -r '.target_metric // "unknown"')
          RISK=$(echo "$EXP" | jq -r '.risk_level // "unknown"')

          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "target_file=$TARGET_FILE" >> "$GITHUB_OUTPUT"
          echo "target_metric=$TARGET_METRIC" >> "$GITHUB_OUTPUT"
          echo "risk=$RISK" >> "$GITHUB_OUTPUT"

      - name: Append to EVOLUTION_LEDGER.md
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          DATE=$(date -u +%Y-%m-%d)
          TITLE="${{ steps.parse.outputs.title }}"
          OUTCOME="${{ inputs.outcome }}"
          TARGET="${{ steps.parse.outputs.target_file }}"
          METRIC="${{ steps.parse.outputs.target_metric }}"
          RISK="${{ steps.parse.outputs.risk }}"
          BEFORE='${{ inputs.metrics_before }}'
          AFTER='${{ inputs.metrics_after }}'
          FAILURE='${{ inputs.failure_reason }}'

          # Create ledger if it doesn't exist
          if [ ! -f EVOLUTION_LEDGER.md ]; then
            cat > EVOLUTION_LEDGER.md << 'HEADER'
          # Evolution Ledger

          Append-only log of every organism experiment attempt.
          Each entry records what was tried, what happened, and what was learned.

          ---

          HEADER
          fi

          # Determine outcome emoji
          case "$OUTCOME" in
            merged) EMOJI="✅" ;;
            failed) EMOJI="❌" ;;
            closed) EMOJI="🚫" ;;
            *)      EMOJI="❓" ;;
          esac

          # Append entry
          cat >> EVOLUTION_LEDGER.md << ENTRY_EOF

          ### ${EMOJI} ${TITLE}
          - **Date:** ${DATE}
          - **Outcome:** ${OUTCOME}
          - **Target:** ${TARGET}
          - **Metric:** ${METRIC}
          - **Risk:** ${RISK}
          - **Before:** $(echo "$BEFORE" | jq -c '.' 2>/dev/null || echo "$BEFORE")
          - **After:** $(echo "$AFTER" | jq -c '.' 2>/dev/null || echo "$AFTER")
          $([ -n "$FAILURE" ] && echo "- **Failure reason:** ${FAILURE}")

          ENTRY_EOF

      - name: Update quality floor on success
        if: inputs.outcome == 'merged'
        run: |
          METRIC="${{ steps.parse.outputs.target_metric }}"
          AFTER='${{ inputs.metrics_after }}'

          if [ -f .quality-floor.json ] && [ "$AFTER" != "{}" ]; then
            # Check if the target metric improved
            AFTER_VALUE=$(echo "$AFTER" | jq ".${METRIC} // null" 2>/dev/null)
            CURRENT_FLOOR=$(jq ".${METRIC} // null" .quality-floor.json 2>/dev/null)

            if [ "$AFTER_VALUE" != "null" ] && [ "$CURRENT_FLOOR" != "null" ]; then
              # For error counts, lower is better
              case "$METRIC" in
                eslintErrors|eslintWarnings|anyCount|mockCount|a11yViolations|tsIgnoreComments|bundleSizeKB|longestResponseMs|untestedFiles)
                  if [ "$(echo "$AFTER_VALUE < $CURRENT_FLOOR" | bc -l 2>/dev/null || echo 0)" = "1" ]; then
                    echo "Metric $METRIC improved: $CURRENT_FLOOR → $AFTER_VALUE"
                    jq ".$METRIC = $AFTER_VALUE | ._updated = \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\" | ._updatedBy = \"organism-learn\"" \
                      .quality-floor.json > /tmp/qf.json && mv /tmp/qf.json .quality-floor.json
                  fi
                  ;;
                coveragePercent|e2ePassRate|testCount)
                  # For coverage/pass rates, higher is better
                  if [ "$(echo "$AFTER_VALUE > $CURRENT_FLOOR" | bc -l 2>/dev/null || echo 0)" = "1" ]; then
                    echo "Metric $METRIC improved: $CURRENT_FLOOR → $AFTER_VALUE"
                    jq ".$METRIC = $AFTER_VALUE | ._updated = \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\" | ._updatedBy = \"organism-learn\"" \
                      .quality-floor.json > /tmp/qf.json && mv /tmp/qf.json .quality-floor.json
                  fi
                  ;;
              esac
            fi
          fi

      - name: Update LEARNINGS.md
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%d)
          TITLE="${{ steps.parse.outputs.title }}"
          OUTCOME="${{ inputs.outcome }}"
          FAILURE='${{ inputs.failure_reason }}'

          if [ ! -f LEARNINGS.md ]; then
            cat > LEARNINGS.md << 'HEADER'
          # Learnings

          Accumulated knowledge from organism experiments.

          ## Successful Patterns

          ## Anti-Patterns (Failures)

          HEADER
          fi

          if [ "$OUTCOME" = "merged" ]; then
            # Append to successful patterns section
            sed -i "/## Successful Patterns/a\\
          - **${TIMESTAMP}** — ${TITLE}: Experiment succeeded. Metric improved as expected." LEARNINGS.md
          elif [ "$OUTCOME" = "failed" ]; then
            # Append to anti-patterns section
            sed -i "/## Anti-Patterns (Failures)/a\\
          - **${TIMESTAMP}** — ${TITLE}: ${FAILURE}" LEARNINGS.md
          fi

      - name: Check for cooldown (3 consecutive failures)
        if: inputs.outcome == 'failed'
        run: |
          METRIC="${{ steps.parse.outputs.target_metric }}"

          # Count recent consecutive failures for this metric
          RECENT_FAILURES=$(grep -c "❌.*${METRIC}" EVOLUTION_LEDGER.md 2>/dev/null || echo 0)

          if [ "$RECENT_FAILURES" -ge 3 ]; then
            echo "::warning::Metric ${METRIC} has $RECENT_FAILURES consecutive failures — entering cooldown"

            # Write cooldown marker
            mkdir -p .agent
            jq -n \
              --arg metric "$METRIC" \
              --arg until "$(date -u -d '+3 days' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -v+3d +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || echo 'unknown')" \
              '{metric: $metric, cooldown_until: $until, reason: "3 consecutive failures"}' \
              >> .agent/cooldowns.json
          fi

      - name: Check for skill extraction (3+ successes)
        if: inputs.outcome == 'merged'
        run: |
          TARGET="${{ steps.parse.outputs.target_file }}"

          # Count successful experiments targeting similar files
          SUCCESSES=$(grep -c "✅.*${TARGET}" EVOLUTION_LEDGER.md 2>/dev/null || echo 0)

          if [ "$SUCCESSES" -ge 3 ]; then
            echo "::notice::Pattern at ${TARGET} has $SUCCESSES successes — consider extracting as a reusable skill"
          fi

      - name: Commit learnings
        run: |
          git config user.name "organism[bot]"
          git config user.email "organism[bot]@users.noreply.github.com"
          git add EVOLUTION_LEDGER.md LEARNINGS.md .quality-floor.json .agent/ 2>/dev/null || true
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "learn: ${{ inputs.outcome }} — ${{ steps.parse.outputs.title }}"
          git push
