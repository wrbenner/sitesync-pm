name: The Product Mind — Experiment Designer

# Runs at 11pm CDT (4am UTC) every night — 3 hours before the organism builds
# Reads .metrics/*.json + vision docs + recent progress
# Primary output: EXPERIMENTS.md — ranked experiment queue for tonight's organism
on:
  schedule:
    - cron: '0 4 * * *'   # 11:00 PM CDT / 4:00 AM UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  design-experiments:
    name: "Design Tonight's Experiments"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 30

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: rm -f package-lock.json && npm install
      - run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.name "SiteSync Product Mind"
          git config user.email "mind@sitesync.ai"
          git config pull.rebase true

      - name: Gather intelligence
        run: |
          echo "=== WORKER CELL METRICS ===" > /tmp/intel.txt

          echo "--- Type Issues (from worker cells) ---" >> /tmp/intel.txt
          cat .metrics/type-issues.json 2>/dev/null >> /tmp/intel.txt || echo "No type metrics yet" >> /tmp/intel.txt

          echo -e "\n--- Quality Issues (from worker cells) ---" >> /tmp/intel.txt
          cat .metrics/quality-issues.json 2>/dev/null >> /tmp/intel.txt || echo "No quality metrics yet" >> /tmp/intel.txt

          echo -e "\n--- Untested Files (from worker cells) ---" >> /tmp/intel.txt
          cat .metrics/untested-files.json 2>/dev/null >> /tmp/intel.txt || echo "No test metrics yet" >> /tmp/intel.txt

          echo -e "\n=== RECENT COMMITS (last 24h) ===" >> /tmp/intel.txt
          git log --since="24 hours ago" --oneline >> /tmp/intel.txt 2>/dev/null || echo "No recent commits" >> /tmp/intel.txt

          echo -e "\n=== SPEC PROGRESS ===" >> /tmp/intel.txt
          CHECKED=$(grep -c "^\- \[x\]" SPEC.md 2>/dev/null || echo "0")
          TOTAL=$(grep -c "^\- \[" SPEC.md 2>/dev/null || echo "431")
          echo "$CHECKED / $TOTAL criteria complete" >> /tmp/intel.txt

          echo -e "\n=== QUALITY FLOOR ===" >> /tmp/intel.txt
          cat .quality-floor.json 2>/dev/null >> /tmp/intel.txt || echo "No floor set" >> /tmp/intel.txt

          echo -e "\n=== LAST EXPERIMENT RESULTS ===" >> /tmp/intel.txt
          grep "✅\|❌\|RESULT:" EXPERIMENTS.md 2>/dev/null | tail -20 >> /tmp/intel.txt || echo "No prior experiments" >> /tmp/intel.txt

          echo -e "\n=== EVOLUTION PATTERNS ===" >> /tmp/intel.txt
          python3 -c "import json; d=json.load(open('EVOLUTION_LEDGER.json')); [print(e['description']) for e in d.get('evolutions',[])[-5:]]" 2>/dev/null >> /tmp/intel.txt || true

          echo -e "\n=== RESEARCH FINDINGS (summary) ===" >> /tmp/intel.txt
          head -40 RESEARCH_FINDINGS.md 2>/dev/null >> /tmp/intel.txt || true

          echo -e "\n=== ANTI-PATTERNS FROM LEARNINGS (avoid these) ===" >> /tmp/intel.txt
          grep -A 1 "Do NOT\|NEVER\|ALWAYS\|CRITICAL" LEARNINGS.md 2>/dev/null | head -30 >> /tmp/intel.txt || true

          echo -e "\n=== UNCHECKED P0 SPEC CRITERIA (top experiment candidates) ===" >> /tmp/intel.txt
          grep -B 2 "P0" SPEC.md 2>/dev/null | grep "^\- \[ \]" | head -20 >> /tmp/intel.txt || echo "Could not extract P0 criteria" >> /tmp/intel.txt

          echo -e "\n=== ESLINT ISSUES (from worker cells) ===" >> /tmp/intel.txt
          cat .metrics/eslint-issues.json 2>/dev/null >> /tmp/intel.txt || echo "No eslint metrics yet" >> /tmp/intel.txt

          echo -e "\n=== KILLED APPROACHES (never design experiments that use these) ===" >> /tmp/intel.txt
          python3 -c "import json; d=json.load(open('EVOLUTION_LEDGER.json')); [print(f'  KILLED: {k[\"description\"]}') for k in d.get('killed_approaches',[])]" 2>/dev/null >> /tmp/intel.txt || true

      - name: Product Mind designs experiments
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          INTEL=$(cat /tmp/intel.txt)

          claude \
            --dangerously-skip-permissions \
            --model claude-opus-4-6 \
            --max-turns 25 \
            "You are The Product Mind — the strategic brain of SiteSync PM.

          YOUR IDENTITY — read these first to understand the vision:
          1. cat THE_OMEGA_BUILD.md — the 3-layer technical vision
          2. cat THE_OVERRIDE_PROTOCOL.md — how to think (Amazon/Apple/Google/Netflix/Tesla)
          3. cat THE_DEEP_TRANSMISSION.md — natural intelligence patterns
          4. Read SPEC.md — grep for unchecked P0 and P1 criteria (don't read the full file)
             Run: grep -B 2 'P0' SPEC.md | grep '^\- \[ \]' | head -30
             This gives you the exact unchecked P0 acceptance criteria for experiment targets

          TODAY'S INTELLIGENCE (from worker cells + git):
          $INTEL

          YOUR PRIMARY OUTPUT: Generate EXPERIMENTS.md

          EXPERIMENTS.md is a ranked queue of 20-30 micro-experiments for tonight's organism.
          Each experiment follows the Karpathy pattern: change → measure → keep or revert.

          CRITICAL: You MUST use bash to physically write the file. Do not just describe
          the content — actually run a command like:
            cat > EXPERIMENTS.md << 'EXPEOF'
            [content here]
            EXPEOF
          The file must exist on disk when you're done. If you don't write it, the organism
          has nothing to work from tonight.

          Also update DAILY_REPORT.md by appending (not overwriting) today's assessment.
          Also update FEEDBACK.md priorities section.

          Write EXPERIMENTS.md in this exact format:

          # EXPERIMENTS.md
          Generated by Product Mind — [today's date]
          Strategy: [1 sentence explaining tonight's strategic focus]

          ## Queue

          ### EXP-001: [Short description]
          - **File(s)**: [exact path(s) in the repo]
          - **Task**: [specific, unambiguous instruction — what to change and how]
          - **Metric**: [what to measure — must be a number or boolean]
          - **Current**: [current value — get from .metrics/ data or state N/A]
          - **Target**: [expected value after change]
          - **Verify**: [exact shell command that outputs the metric value]
          - **Category**: TYPE_SAFETY | QUALITY | TESTING | FEATURE | PERFORMANCE
          - **Priority**: P0 | P1 | P2
          - **Status**: PENDING

          [repeat for 20-30 experiments]

          EXPERIMENT DESIGN RULES:
          1. Each experiment touches 1-3 files maximum (small blast radius for clean revert)
          2. Every experiment MUST have a concrete Verify command the organism can run
          3. P0 experiments first (blocks demo), P1 (improves demo), P2 (polish)
          4. Mix categories: alternate TYPE_SAFETY, QUALITY, FEATURE, TESTING
             (monotony causes context fatigue — Anthropic finding)
          5. Use .metrics/ data to target WORST files first (highest issue count)
          6. Include 5-8 FEATURE experiments from unchecked SPEC.md P0 criteria
          7. The organism completes ~15-20 experiments per night — design 25-30 for buffer
          8. Remove any experiments that were ✅ PASS in previous runs
          9. For FEATURE experiments, the verify command should check if the feature exists
             (e.g., grep for component name, check route exists, verify export)
          10. Consider the April 15th demo deadline — prioritize GC-visible features

          ALSO DO (secondary outputs):
          - Append to DAILY_REPORT.md: today's date, what organism built, quality trend,
            experiment results summary, ON TRACK / NEEDS ATTENTION / AT RISK assessment
          - Update FEEDBACK.md 'Tonight P0 Priorities' section with 3 specific priorities

          WEEKLY (Sunday only): Meta-improvement — review last 7 days of DAILY_REPORT.md,
          evaluate your own experiment design quality, adjust strategy.

          COMMIT:
          git add EXPERIMENTS.md DAILY_REPORT.md FEEDBACK.md
          git commit -m 'strategy: experiment queue for [date] [mind][skip ci]'

          Output <promise>DONE</promise> when complete." || true

      - name: Push updates
        run: |
          git add EXPERIMENTS.md FEEDBACK.md DAILY_REPORT.md 2>/dev/null || true
          CHANGES=$(git diff --cached --name-only | wc -l | tr -d ' ')
          if [ "$CHANGES" -gt "0" ]; then
            git pull --rebase origin main 2>/dev/null || true
            git commit -m "strategy: experiment queue update [mind][skip ci]" || true
            git push origin main || true
            echo "Product Mind pushed experiment queue"
          else
            echo "Product Mind made no changes today"
          fi
