name: The Product Mind — Strategic Overseer

# Runs at 11pm CDT (4am UTC) every night — 3 hours before the organism builds
# Reviews today's work, reads the vision, sets tomorrow's priorities
# This is the brain. The organism is the hands.
on:
  schedule:
    - cron: '0 4 * * *'   # 11:00 PM CDT / 4:00 AM UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  think:
    name: "The Product Mind"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 30

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: rm -f package-lock.json && npm install
      - run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.name "SiteSync Product Mind"
          git config user.email "mind@sitesync.ai"

      - name: Gather intelligence
        id: intel
        run: |
          echo "=== RESEARCH FINDINGS (frontier intelligence) ===" >> /tmp/daily-intel.txt
          head -40 RESEARCH_FINDINGS.md >> /tmp/daily-intel.txt 2>/dev/null

          echo "=== PRODUCT MIND MEMORY (last 7 days) ===" >> /tmp/daily-intel.txt
          tail -100 DAILY_REPORT.md >> /tmp/daily-intel.txt 2>/dev/null

          echo "=== EVOLUTION LEDGER (recent patterns) ===" >> /tmp/daily-intel.txt
          python3 -c "import json; d=json.load(open('EVOLUTION_LEDGER.json')); [print(e['description']) for e in d.get('evolutions',[])[-5:]]" >> /tmp/daily-intel.txt 2>/dev/null

          echo "=== STIGMERGY TRAILS ===" >> /tmp/daily-intel.txt
          grep -A 2 "Stigmergy" LEARNINGS.md >> /tmp/daily-intel.txt 2>/dev/null

          echo "=== TODAY'S ORGANISM COMMITS ===" > /tmp/daily-intel.txt
          git log --since="24 hours ago" --oneline >> /tmp/daily-intel.txt 2>/dev/null

          echo -e "\n=== SPEC PROGRESS ===" >> /tmp/daily-intel.txt
          CHECKED=$(grep -c "^\- \[x\]" SPEC.md 2>/dev/null || echo "0")
          TOTAL=$(grep -c "^\- \[" SPEC.md 2>/dev/null || echo "431")
          echo "$CHECKED / $TOTAL criteria complete ($((CHECKED * 100 / TOTAL))%)" >> /tmp/daily-intel.txt

          echo -e "\n=== TONIGHT.MD STATUS ===" >> /tmp/daily-intel.txt
          grep "TONIGHT:\|COMPLETED" TONIGHT.md >> /tmp/daily-intel.txt 2>/dev/null

          echo -e "\n=== QUALITY METRICS ===" >> /tmp/daily-intel.txt
          cat .quality-floor.json >> /tmp/daily-intel.txt 2>/dev/null

          echo -e "\n=== OPEN ISSUES ===" >> /tmp/daily-intel.txt
          cat /tmp/daily-intel.txt | head -5

      - name: The Product Mind thinks
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          INTEL=$(cat /tmp/daily-intel.txt)

          claude \
            --dangerously-skip-permissions \
            --model claude-opus-4-6 \
            --max-turns 25 \
            "You are The Product Mind — the strategic brain of SiteSync PM.

          You are not a coder. You are a product strategist who thinks like the founder.
          Your job: review today's progress, think deeply about what matters most, and
          set tomorrow's priorities so the organism (the coder) builds the right thing.

          YOUR IDENTITY — READ THESE TO UNDERSTAND WHO YOU ARE:
          1. cat THE_OMEGA_BUILD.md — the 3-layer technical vision
          2. cat THE_OVERRIDE_PROTOCOL.md — how to think (Amazon/Apple/Google/Netflix/Tesla)
          3. cat THE_DEEP_TRANSMISSION.md — natural intelligence patterns, construction truths
          4. cat THE_ORGANISM.md — the 13 biological systems

          TODAY'S INTELLIGENCE:
          $INTEL

          YOUR TASKS (do all 4):

          TASK 1: DAILY ASSESSMENT
          Read today's commits. Read the current TONIGHT.md status. Assess:
          - Is the organism on track for April 15th?
          - Did it build the RIGHT thing or did it drift?
          - Are there quality concerns in what was built?
          - Is the TONIGHT.md sequence still optimal or should it be adjusted?

          TASK 2: UPDATE FEEDBACK.md PRIORITIES
          Read the current FEEDBACK.md. Update ONLY the 'Tonight P0 Priorities' section
          with 3 specific priorities for tomorrow's organism run. These must be:
          - Specific (name exact files, functions, behaviors)
          - Aligned with the Omega Build vision
          - The highest-impact work for getting to April 15th demo readiness
          - Passing the Amazon test: what decision can a GC make in 10 seconds?
          DO NOT overwrite the rest of FEEDBACK.md. Only update the priorities section.

          TASK 3: WRITE DAILY REPORT
          Create or update DAILY_REPORT.md with a brief report:
          - Date
          - What the organism built today (1 paragraph)
          - Quality metrics trend (improving/stable/declining)
          - TONIGHT.md progress (which night, how many completed)
          - Assessment: ON TRACK / NEEDS ATTENTION / AT RISK
          - Tomorrow's strategic focus (1 sentence)
          Append to the file, don't overwrite previous days.

          TASK 4: ADJUST TONIGHT.MD IF NEEDED
          If you determine the nightly mission sequence should change (skip a night,
          add something, reprioritize), update TONIGHT.md. Otherwise leave it alone.
          Only adjust if there is a clear strategic reason.

          CRITICAL THINKING RULES:
          - Apply the Amazon test: if you cannot write a press release for tomorrow's work,
            the priorities are wrong
          - Apply the Apple test: is there anything the organism is building that a user
            will never notice? Deprioritize it.
          - The schedule is a political document (construction truth): the TONIGHT.md
            sequence was written before the organism started. Reality may have diverged.
            Adapt.
          - Cash flow is the actual critical path (construction truth): the financial
            engine and embedded payments are more strategically important than visual polish

          COMMIT FORMAT:
          - FEEDBACK.md changes: 'strategy: daily priority update [mind][skip ci]'
          - DAILY_REPORT.md changes: 'report: daily assessment [mind][skip ci]'
          - TONIGHT.md changes: 'strategy: mission adjustment [mind][skip ci]'

          TASK 5: META-IMPROVEMENT (weekly, every Sunday)
          If today is Sunday, evaluate your own decision quality:
          - Read the last 7 days of DAILY_REPORT.md
          - Did the organism build what you prioritized? If not, why?
          - Were your priorities the RIGHT priorities in hindsight?
          - What would you change about how you make decisions?
          - Write your meta-reflection at the bottom of DAILY_REPORT.md
          Read RESEARCH_FINDINGS.md for the latest frontier research.
          Watch for entropy decay: if the organism is doing the same type of work
          3+ nights in a row, force a domain switch.

          Output <promise>DONE</promise> when all tasks are complete." || true

      - name: Push updates
        run: |
          git add FEEDBACK.md DAILY_REPORT.md TONIGHT.md 2>/dev/null || true
          CHANGES=$(git diff --cached --name-only | wc -l | tr -d ' ')
          if [ "$CHANGES" -gt "0" ]; then
            git commit -m "strategy: Product Mind daily update [mind][skip ci]" || true
            git push origin main || true
            echo "Product Mind pushed $CHANGES file(s)"
          else
            echo "Product Mind made no changes today"
          fi
