name: Nightly Organism — Autonomous Build

# Runs at 2am CDT (7am UTC) every night
# Reads TONIGHT.md for tonight's specific mission — no guessing
on:
  schedule:
    - cron: '0 7 * * *'   # 2:00 AM CDT daily
  workflow_dispatch:
    inputs:
      override_mission:
        description: 'Override tonight mission (leave empty to use TONIGHT.md)'
        required: false
      use_opus:
        description: 'Use Opus (default true)'
        default: 'true'

permissions:
  contents: write
  issues: write

jobs:
  organism:
    name: "Nightly Build"
    runs-on: ubuntu-latest
    timeout-minutes: 240   # 4 hours max for big missions

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install
        run: rm -f package-lock.json && npm install

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.name "SiteSync Organism"
          git config user.email "organism@sitesync.ai"
          git config pull.rebase true

      - name: Read tonight's mission
        id: mission
        run: |
          OVERRIDE="${{ github.event.inputs.override_mission }}"
          if [ -n "$OVERRIDE" ]; then
            echo "MISSION=$OVERRIDE" >> $GITHUB_ENV
            echo "Using override mission"
          elif [ -f "TONIGHT.md" ]; then
            # Extract tonight's mission title
            TONIGHT=$(grep "^## TONIGHT:" TONIGHT.md | head -1 | sed 's/## TONIGHT: //')
            echo "MISSION=$TONIGHT" >> $GITHUB_ENV
            echo "Tonight's mission: $TONIGHT"
          else
            echo "MISSION=Read SPEC.md and implement the highest-priority unchecked P0 criterion" >> $GITHUB_ENV
          fi

      - name: Run organism
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          MODEL="claude-opus-4-6"
          MAX_TURNS="80"

          claude \
            --dangerously-skip-permissions \
            --model "$MODEL" \
            --max-turns "$MAX_TURNS" \
            "You are the SiteSync PM autonomous build agent — Night Mission Runner.

          TONIGHT'S MISSION: $MISSION

          READ THESE FILES IMMEDIATELY (before doing anything else):
          1. cat TONIGHT.md                           — your specific mission for tonight
          2. cat v7-prompts/V7-00_SYSTEM_CONTEXT.md  — tech stack rules (CRITICAL for V7 work)
          3. cat LEARNINGS.md                         — what to avoid (especially migration rules)
          4. cat AGENTS.md                            — your operating instructions
          5. cat FEEDBACK.md                          — Walker's priorities

          MISSION EXECUTION PROTOCOL:
          1. Read TONIGHT.md completely
          2. Identify the TONIGHT section (not UPCOMING or COMPLETED)
          3. Execute each step in that section completely
          4. For each prompt file referenced: cat the file, read it fully, implement EVERYTHING in it
          5. Run quality gates after every batch of changes: npx tsc --noEmit && npm run lint && npm run build
          6. Commit changes with format: feat(scope): description [auto]
          7. After completing ALL steps: update TONIGHT.md to mark tonight COMPLETED and advance the next UPCOMING to TONIGHT
          8. Commit the TONIGHT.md update: chore: advance TONIGHT.md to next night [auto]

          QUALITY GATES (must pass before every commit):
          - npx tsc --noEmit (zero TypeScript errors)
          - npm run lint (no new ESLint errors)
          - npx vitest run --passWithNoTests (tests pass)
          - npm run build (build succeeds)

          NEVER:
          - Skip steps because they seem hard
          - Commit code that fails quality gates
          - Create new migrations without checking existing ones first (read LEARNINGS.md)
          - Use as any type casts
          - Add mock data to src/
          - Use hyphens in any UI text (V7 rule)

          IMPORTANT: If tonight is Night 1, run `node fix-mock-data.mjs` FIRST before reading any prompt file. This is a programmatic mock data fixer.

          Output <promise>DONE</promise> when tonight's complete mission is finished." || true

      - name: Push to main
        run: |
          COMMITS=$(git log origin/main..HEAD --oneline 2>/dev/null | wc -l | tr -d ' ')
          if [ "$COMMITS" -gt "0" ]; then
            git pull --rebase origin main 2>/dev/null || true
            git push origin main
            echo "Pushed $COMMITS commit(s)"
            echo "## Night Mission Complete — $(date '+%B %d %Y')" >> $GITHUB_STEP_SUMMARY
            git log origin/main~${COMMITS}..origin/main --oneline >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          else
            echo "No commits this session"
          fi

      - name: Alert if nothing was committed
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMITS=$(git log origin/main..HEAD --oneline 2>/dev/null | wc -l | tr -d ' ')
          PUSHED=$(git log --since="1 hour ago" --author="SiteSync Organism" --oneline 2>/dev/null | wc -l | tr -d ' ')
          if [ "$COMMITS" -eq "0" ] && [ "$PUSHED" -eq "0" ]; then
            gh issue create \
              --title "[organism] No commits on $(date '+%B %d') — check logs" \
              --body "The organism ran but produced no commits. Mission: $MISSION. Check the [workflow logs](https://github.com/${{ github.repository }}/actions) for details." \
              --label "bug" 2>/dev/null || true
          fi
