name: Nightly Organism — Autonomous Build

# 3x daily: 2am implement, 8am test, 2pm polish
on:
  schedule:
    - cron: '0 7 * * *'    # 2:00 AM CDT — implementation
    - cron: '0 13 * * *'   # 8:00 AM CDT — testing
    - cron: '0 19 * * *'   # 2:00 PM CDT — polish
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: implement, test, polish, or verify'
        default: 'implement'
      use_opus:
        description: 'Use Opus instead of Sonnet (slower, better for complex work)'
        default: 'false'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  organism:
    name: "Organism — ${{ github.event.inputs.mode || 'scheduled' }}"
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
      - run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.name "SiteSync Organism"
          git config user.email "organism@sitesync.ai"

      - name: Determine wave and model
        id: config
        run: |
          HOUR=$(date -u +%H)
          MODE="${{ github.event.inputs.mode }}"
          USE_OPUS="${{ github.event.inputs.use_opus }}"

          if [ -n "$MODE" ]; then
            WAVE="$MODE"
          elif [ "$HOUR" -eq "7" ]; then
            WAVE="implement"
          elif [ "$HOUR" -eq "13" ]; then
            WAVE="test"
          else
            WAVE="polish"
          fi

          # Use Sonnet for test/polish waves (cheaper), Opus for implement
          if [ "$WAVE" = "implement" ] || [ "$USE_OPUS" = "true" ]; then
            MODEL="claude-opus-4-6"
            MAX_TURNS="50"
          else
            MODEL="claude-sonnet-4-6"
            MAX_TURNS="40"
          fi

          echo "wave=$WAVE" >> $GITHUB_OUTPUT
          echo "model=$MODEL" >> $GITHUB_OUTPUT
          echo "max_turns=$MAX_TURNS" >> $GITHUB_OUTPUT
          echo "Wave: $WAVE | Model: $MODEL | Max turns: $MAX_TURNS"

      - name: Create branch
        run: |
          BRANCH="auto/organism-$(date +%Y%m%d-%H%M)"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Run organism
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          WAVE="${{ steps.config.outputs.wave }}"
          FEEDBACK=$(cat FEEDBACK.md 2>/dev/null | head -25 || echo "No FEEDBACK.md")

          case "$WAVE" in
            "implement")
              INSTRUCTION="Read SPEC.md. Read FEEDBACK.md — do founder priorities first. Implement the next highest-priority unchecked acceptance criterion. Include: code + unit tests + E2E test + SPEC.md checkbox update."
              ;;
            "test")
              INSTRUCTION="Coverage mission: find 3 components or hooks with zero test coverage. Write thorough unit tests. Do NOT change implementation. Run coverage after to verify improvement."
              ;;
            "polish")
              INSTRUCTION="Quality mission: run axe-core on 5 pages, fix every violation. Then find 2 performance issues (missing memo, N+1 query, large bundle). Fix them. Update .quality-floor.json if metrics improved."
              ;;
            "verify")
              INSTRUCTION="Verification mission: pick 3 recently-added features. Try to break each one. Edge cases, empty inputs, concurrent edits. Uncheck any SPEC.md criteria that fail adversarial testing."
              ;;
          esac

          claude \
            --dangerously-skip-permissions \
            --model "${{ steps.config.outputs.model }}" \
            --max-turns "${{ steps.config.outputs.max_turns }}" \
            "Context files to read first: FEEDBACK.md, SPEC.md, AGENTS.md, LEARNINGS.md, DECISIONS.md, .quality-floor.json

            FOUNDER PRIORITIES (from FEEDBACK.md):
            $FEEDBACK

            YOUR MISSION: $INSTRUCTION

            Quality gates before every commit: npx tsc --noEmit && npm run lint && npx vitest run --passWithNoTests && npm run build
            Commit format: feat(scope): description [auto]
            Output <promise>DONE</promise> when finished." || true

      - name: Push and create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMITS=$(git log origin/main..HEAD --oneline 2>/dev/null | wc -l | tr -d ' ')
          if [ "$COMMITS" -gt "0" ]; then
            git push origin "$BRANCH"
            gh pr create \
              --title "[auto] ${{ steps.config.outputs.wave }} — $(date +%Y-%m-%d %H:%M UTC)" \
              --body "$(git log origin/main..HEAD --oneline)" \
              --base main \
              --head "$BRANCH" \
              --label "auto-generated" || true
          fi

      - name: Auto-merge if CI passes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Wait 3 minutes for CI to start
          sleep 180
          # Get the PR number we just created
          PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$PR" ]; then
            gh pr merge "$PR" --auto --squash --delete-branch || true
          fi
