name: Post-Session Learning — Evolution Engine

# Runs AFTER the nightly organism completes (not on push — GITHUB_TOKEN pushes don't trigger workflows)
# Analyzes what was built, extracts patterns, deposits intelligence
# This is somatic hypermutation — the organism learns from every encounter
on:
  workflow_run:
    workflows: ["Nightly Organism — Experiment Runner"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  learn:
    name: "Extract learnings"
    # Only run if the organism actually completed (not cancelled/failed)
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: rm -f package-lock.json && npm install
      - run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.name "SiteSync Evolution Engine"
          git config user.email "evolution@sitesync.ai"

      - name: Analyze and extract learnings
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Gather context about what just happened
          RECENT_COMMITS=$(git log --since="4 hours ago" --oneline --stat | head -60)
          CHANGED_FILES=$(git diff HEAD~1 --name-only | head -30)
          DIFF_SUMMARY=$(git diff HEAD~1 --stat | tail -5)

          claude \
            --dangerously-skip-permissions \
            --model claude-sonnet-4-6 \
            --max-turns 15 \
            "You are the Evolution Engine for SiteSync PM. Your ONLY job is to extract
          intelligence from what just happened and deposit it into the environment.

          WHAT JUST HAPPENED:
          $RECENT_COMMITS

          FILES CHANGED:
          $CHANGED_FILES

          DIFF SUMMARY:
          $DIFF_SUMMARY

          YOUR 3 TASKS:

          TASK 1: UPDATE LEARNINGS.md
          Read the current LEARNINGS.md. Based on what just happened, add any NEW
          patterns or anti-patterns discovered. Only add genuinely new insights, not
          things already documented. Format:

          ### [Date] [Category]
          Pattern/anti-pattern description

          Categories: Implementation Pattern, Testing Pattern, Performance Insight,
          Architecture Decision, Common Mistake, Domain Insight

          TASK 2: UPDATE EVOLUTION_LEDGER.json
          Read the current EVOLUTION_LEDGER.json. Add an entry to the 'evolutions' array:
          {
            'id': 'EVO-NNN',
            'date': 'YYYY-MM-DD',
            'description': 'what was done',
            'files_changed': N,
            'approach': 'how it was done',
            'quality_impact': 'what metrics improved',
            'turns_used': 'estimated',
            'reusable_pattern': true/false
          }

          TASK 3: DEPOSIT STIGMERGY TRAIL
          If you find a pattern that future sessions should follow, add it to
          LEARNINGS.md under '## Stigmergy Trails (strongest patterns)'.
          These are the paths that future agents should follow by default.
          Format: 'When doing X, always start with Y because Z.'

          IMPORTANT:
          - Be concise. Each learning should be 1-2 sentences.
          - Only add genuinely NEW learnings. Read existing entries first.
          - Do NOT modify any source code. Only LEARNINGS.md and EVOLUTION_LEDGER.json.
          - Commit: 'learn: post-session intelligence deposit [evolution][skip ci]'

          Output <promise>DONE</promise> when finished." || true

      - name: Push learnings
        run: |
          git add LEARNINGS.md EVOLUTION_LEDGER.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "learn: post-session intelligence deposit [evolution][skip ci]" || true
            git push origin main || true
            echo "New learnings deposited into the environment"
          fi
