# Gate 18 - Storage Bucket Contracts (B.8)
#
# Runs tests/storage/*.spec.ts via vitest. Asserts every Supabase storage
# bucket referenced from src/services/storage* exists, is private (or
# explicitly marked public), and has a matching RLS storage policy that
# matches the path convention used by upload callers.
#
# Informational mode until staging credentials are wired into secrets.
#
# Required secrets:
#   STAGING_SUPABASE_URL
#   STAGING_SUPABASE_ANON_KEY
#   STAGING_SUPABASE_SERVICE_KEY
#
# SECURITY: only secrets.* via env: blocks. No github.event.* in run:.

name: Gate 18 - Storage Bucket Contracts

on:
  pull_request:
    paths:
      - 'supabase/**'
      - 'src/services/storage*'
      - 'tests/storage/**'
  push:
    branches: [main]

jobs:
  storage-buckets:
    name: Storage bucket + policy contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci

      - name: Run vitest storage bucket suite
        env:
          SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL:-}" ]; then
            echo "::warning::STAGING_SUPABASE_URL not set; gate skipped (informational mode)."
            exit 0
          fi
          npx vitest run tests/storage/
