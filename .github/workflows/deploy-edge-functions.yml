# Deploy Supabase Edge Functions
#
# Auto-deploys every function in supabase/functions/ to the linked prod
# project on push to main when supabase/functions/** changes. Catches the
# class of bug where shared/auth.ts is edited but only the directly-touched
# function gets redeployed, leaving every other caller with stale CORS or
# auth logic.
#
# Required secrets:
#   SUPABASE_ACCESS_TOKEN   personal access token (sbp_...) with deploy scope
#   SUPABASE_PROJECT_REF    prod project ref
#
# SECURITY: only secrets.* via env: blocks. No github.event.* in run:.

name: Deploy edge functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-edge-functions.yml'
  workflow_dispatch:

concurrency:
  group: deploy-edge-functions-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy all edge functions
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify secrets present
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_PROJECT_REF:-}" ] || [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::SUPABASE_PROJECT_REF and SUPABASE_ACCESS_TOKEN must be set"
            exit 1
          fi

      - name: Deploy every function in supabase/functions/
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          failed=()
          for dir in supabase/functions/*/; do
            name="$(basename "$dir")"
            case "$name" in
              shared|_*) continue ;;
            esac
            echo "::group::Deploying $name"
            if supabase functions deploy "$name" --project-ref "$SUPABASE_PROJECT_REF"; then
              echo "deployed $name"
            else
              echo "::error::Failed to deploy $name"
              failed+=("$name")
            fi
            echo "::endgroup::"
          done
          if [ ${#failed[@]} -gt 0 ]; then
            echo "::error::Failed deploys: ${failed[*]}"
            exit 1
          fi

      - name: Install repo deps for audit script
        run: npm ci

      - name: Verify deploy parity (audit script)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          mkdir -p audit
          if ! npx tsx scripts/audit-edge-functions.ts; then
            echo "::error::Audit reports missing or zombie functions"
            cat audit/edge-function-status.md
            exit 1
          fi
          cat audit/edge-function-status.md

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: edge-function-status
          path: audit/edge-function-status.md
          if-no-files-found: ignore
