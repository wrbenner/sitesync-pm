# Gate 53 - Secrets Scan (B41 Supply Chain, Crystalline Tier 6)
#
# Runs gitleaks on every PR (incremental scan of new commits) and weekly
# on main (full historical scan). Catches API keys, JWTs, private keys,
# and other secrets that should never enter the repo.
#
# Config: .gitleaks.toml (extends defaults; allowlists test fixtures
# and example env files).
#
# Promotion path: informational -> required non-blocking (14d) -> blocking (30d).

name: Gate 53 - Secrets Scan

on:
  pull_request:
    paths-ignore:
      - '**.md'
  push:
    branches: [main]
  schedule:
    # Weekly full-history scan on Monday at 12:00 UTC
    - cron: '0 12 * * 1'

jobs:
  gitleaks:
    name: gitleaks scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
