name: Session Brief Generator

# Runs 30 minutes before the nightly organism (1:30am CDT = 6:30am UTC)
# Generates a pre-computed context summary so the organism wastes fewer turns reading files
on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-brief:
    name: "Build Tonight's Session Brief"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 20

      - name: Generate SESSION_BRIEF.md
        run: |
          git config user.name "SiteSync Brief Generator"
          git config user.email "brief@sitesync.ai"
          git config pull.rebase true

          # Experiment queue summary
          PENDING=$(grep -c "PENDING" EXPERIMENTS.md 2>/dev/null || echo "0")
          PASSED=$(grep -c "✅" EXPERIMENTS.md 2>/dev/null || echo "0")
          FAILED=$(grep -c "❌" EXPERIMENTS.md 2>/dev/null || echo "0")
          STRATEGY=$(grep "^Strategy:" EXPERIMENTS.md 2>/dev/null | head -1 || echo "No strategy set")
          P0_EXPS=$(grep -B 1 "P0" EXPERIMENTS.md 2>/dev/null | grep "^###" | head -5 || echo "  None")

          # Recent organism commits
          RECENT=$(git log --since="48 hours ago" --oneline --author="SiteSync" 2>/dev/null | head -10 || echo "No recent organism commits")

          # Worker cell metrics
          TYPE_TOTAL="unknown"
          QUALITY_TOTAL="unknown"
          COVERAGE="unknown"
          if [ -f ".metrics/type-issues.json" ]; then
            TYPE_TOTAL=$(python3 -c "import json; d=json.load(open('.metrics/type-issues.json')); print(f'{d[\"totals\"][\"as_any\"]} as-any, {d[\"totals\"][\"ts_ignore\"]} ts-ignore')" 2>/dev/null || echo "error")
          fi
          if [ -f ".metrics/quality-issues.json" ]; then
            QUALITY_TOTAL=$(python3 -c "import json; d=json.load(open('.metrics/quality-issues.json')); print(f'{d[\"totals\"][\"hardcoded_colors\"]} hardcoded colors, {d[\"totals\"][\"mock_data\"]} mock data')" 2>/dev/null || echo "error")
          fi
          if [ -f ".metrics/untested-files.json" ]; then
            COVERAGE=$(python3 -c "import json; d=json.load(open('.metrics/untested-files.json')); print(f'{d[\"coverage_pct\"]}% ({d[\"tested_count\"]} tested, {d[\"untested_count\"]} untested)')" 2>/dev/null || echo "error")
          fi

          # Quality floor
          MOCK=$(jq '.mockCount // "unknown"' .quality-floor.json 2>/dev/null)
          ANY=$(jq '.anyCount // "unknown"' .quality-floor.json 2>/dev/null)
          LINT=$(jq '.eslintErrors // "unknown"' .quality-floor.json 2>/dev/null)
          CHECKED=$(grep -c "^\- \[x\]" SPEC.md 2>/dev/null || echo "0")
          TOTAL=$(grep -c "^\- \[" SPEC.md 2>/dev/null || echo "431")

          # Days to April 15
          DAYS_LEFT=$(python3 -c "from datetime import date; print((date(2026,4,15) - date.today()).days)" 2>/dev/null || echo "?")

          cat > SESSION_BRIEF.md << BRIEF_EOF
          # SESSION_BRIEF — $(date '+%A %B %d at 2am CDT')
          *Pre-computed context. Generated $(date -u '+%H:%M UTC'). $DAYS_LEFT days until April 15 demo.*

          ## TONIGHT'S EXPERIMENT QUEUE
          $STRATEGY
          - **Pending:** $PENDING experiments
          - **Already passed:** $PASSED | **Failed:** $FAILED
          - **Top P0 experiments:**
          $P0_EXPS

          ## WORKER CELL METRICS (latest)
          | Metric | Value |
          |--------|-------|
          | Type issues | $TYPE_TOTAL |
          | Quality issues | $QUALITY_TOTAL |
          | Test coverage | $COVERAGE |

          ## QUALITY FLOOR
          | Metric | Now | Target |
          |--------|-----|--------|
          | Mock data | $MOCK | 0 |
          | Unsafe casts | $ANY | 0 |
          | ESLint errors | $LINT | 0 |
          | SPEC completion | $CHECKED / $TOTAL | $TOTAL/$TOTAL |

          ## RECENT ORGANISM COMMITS
          $RECENT

          ## NON-NEGOTIABLE RULES
          1. Check PAUSE.md — if PAUSED, stop immediately
          2. Quality gates before EVERY commit: npx tsc --noEmit && npm run lint && npx vitest run --passWithNoTests && npm run build
          3. Never run supabase CLI in CI
          4. Migration rule: ALWAYS CREATE TABLE IF NOT EXISTS + DO/EXCEPTION blocks
          5. 56px touch targets (industrial gloved use)
          6. No hyphens in UI text
          BRIEF_EOF

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' SESSION_BRIEF.md

          echo "SESSION_BRIEF.md generated ($(wc -l < SESSION_BRIEF.md) lines) — $PENDING pending experiments, $DAYS_LEFT days to demo"
          git add SESSION_BRIEF.md
          git commit -m "chore: session brief for $(date '+%B %d') [skip ci]" || echo "No changes"
          git pull --rebase origin main 2>/dev/null || true
          git push origin main || echo "Push failed — brief may be stale"

      - name: Alert if brief generation failed
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[brief-failure] Session brief failed — $(date '+%B %d')" \
            --body "The 1:30am session brief generator failed. The 2am organism will run without a brief. Check [workflow logs](https://github.com/${{ github.repository }}/actions)." \
            --label "bug" 2>/dev/null || true
