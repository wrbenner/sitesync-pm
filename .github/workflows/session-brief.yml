name: Session Brief Generator

# Runs at 1:30am CDT (6:30am UTC) — 30 minutes before the nightly organism.
# Compresses ~37KB of raw context files into a focused ~2-3KB SESSION_BRIEF.md
# using entropy-aware filtering (SimpleMem-inspired three-stage pipeline).
#
# The organism reads SESSION_BRIEF.md INSTEAD of cat-ing CLAUDE.md,
# EXPERIMENTS.md, LEARNINGS.md, and EVOLUTION_LEDGER.json separately.
# Progressive disclosure: start compressed, expand to full files only if needed.
on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:
    inputs:
      verbose:
        description: 'Print detailed compression stats'
        type: boolean
        default: false

permissions:
  contents: write
  issues: write

jobs:
  generate-brief:
    name: "Compress context → SESSION_BRIEF.md"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 20   # enough for git log used by compress-context.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure git identity
        run: |
          git config user.name  "SiteSync Brief Generator"
          git config user.email "brief@sitesync.ai"
          git config pull.rebase true

      - name: Run compress-context.py
        id: compress
        run: |
          VERBOSE_FLAG=""
          if [ "${{ github.event.inputs.verbose }}" = "true" ]; then
            VERBOSE_FLAG="--verbose"
          fi

          python3 scripts/compress-context.py \
            --repo-root . \
            --output SESSION_BRIEF.md \
            $VERBOSE_FLAG

          # Capture stats for summary
          LINES=$(wc -l < SESSION_BRIEF.md | tr -d ' ')
          BYTES=$(wc -c < SESSION_BRIEF.md | tr -d ' ')
          PENDING=$(grep -c "^### \[P" SESSION_BRIEF.md 2>/dev/null || grep -c "^### EXP-" SESSION_BRIEF.md 2>/dev/null || echo "0")
          DAYS=$(grep "days until April 15" SESSION_BRIEF.md | grep -oP '^\d+' || echo "?")

          echo "lines=$LINES"    >> $GITHUB_OUTPUT
          echo "bytes=$BYTES"    >> $GITHUB_OUTPUT
          echo "pending=$PENDING" >> $GITHUB_OUTPUT
          echo "days=$DAYS"      >> $GITHUB_OUTPUT

          echo "Brief stats: ${LINES} lines, ${BYTES} bytes, ${PENDING} pending experiments"

      - name: Commit SESSION_BRIEF.md
        run: |
          DATESTAMP=$(date '+%B %d')
          PENDING="${{ steps.compress.outputs.pending }}"
          DAYS="${{ steps.compress.outputs.days }}"

          git add SESSION_BRIEF.md

          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "SESSION_BRIEF.md unchanged — no commit needed"
          else
            git commit -m "chore: session brief ${DATESTAMP} — ${PENDING} pending, ${DAYS}d to demo [skip ci]"
            git pull --rebase origin main 2>/dev/null || true
            git push origin main
            echo "SESSION_BRIEF.md committed and pushed"
          fi

      - name: Write job summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << SUMMARY_EOF
          ## Session Brief — $(date '+%B %d %Y at %H:%M UTC')

          | Metric | Value |
          |--------|-------|
          | Brief size | ${{ steps.compress.outputs.bytes }} bytes (${{ steps.compress.outputs.lines }} lines) |
          | Pending experiments | ${{ steps.compress.outputs.pending }} |
          | Days to demo | ${{ steps.compress.outputs.days }} |
          | Target window | 2–3KB |

          **Compression approach**: Three-stage entropy-aware pipeline
          - Stage 1: Gathers CLAUDE.md, EXPERIMENTS.md, LEARNINGS.md, EVOLUTION_LEDGER.json, .metrics/*, .quality-floor.json, SKILL_REGISTRY.json, last 20 git commits, SPEC.md P0 items, PAUSE.md
          - Stage 2: Entropy-aware filtering — extracts only actionable signals, deduplicates rules across sources, shows top-5 worst files per metric, keeps only PENDING experiments
          - Stage 3: Renders structured SESSION_BRIEF.md for progressive disclosure

          **Organism reads**: \`cat SESSION_BRIEF.md\` (compressed) → expands to full files only if needed
          SUMMARY_EOF

      - name: Alert if brief generation failed
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[brief-failure] Session brief failed — $(date '+%B %d')" \
            --body "$(cat << 'EOF'
          The 1:30am session brief generator failed. The 2am organism will run without a compressed brief.

          **Impact**: Organism will read CLAUDE.md + EXPERIMENTS.md + LEARNINGS.md + EVOLUTION_LEDGER.json separately (higher token cost, lower focus).

          **Fallback**: The organism's Step 1 in nightly-build.yml falls back to reading full files if SESSION_BRIEF.md is missing or stale.

          Check [workflow logs](https://github.com/${{ github.repository }}/actions).
          EOF
          )" \
          --label "bug" 2>/dev/null || true
