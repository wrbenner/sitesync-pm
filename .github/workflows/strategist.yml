name: Weekly Strategist — Refresh Priorities

# Sunday 10pm CDT (3am UTC Monday) — refreshes priorities
# GUARDS against overwriting active TONIGHT.md mission
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  strategist:
    name: "Refresh FEEDBACK.md"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci
      - run: npm install -g @anthropic-ai/claude-code

      - name: Check if active mission is running
        id: check_mission
        run: |
          # If TONIGHT.md has an active TONIGHT section, do NOT overwrite FEEDBACK.md
          if [ -f "TONIGHT.md" ] && grep -q "^## TONIGHT:" TONIGHT.md; then
            TONIGHT=$(grep "^## TONIGHT:" TONIGHT.md | head -1)
            echo "active_mission=true" >> $GITHUB_OUTPUT
            echo "tonight=$TONIGHT" >> $GITHUB_OUTPUT
            echo "Active mission detected: $TONIGHT — skipping FEEDBACK.md overwrite"
          else
            echo "active_mission=false" >> $GITHUB_OUTPUT
            echo "No active mission — proceeding with weekly refresh"
          fi

      - name: Add weekly status note (mission active — no overwrite)
        if: steps.check_mission.outputs.active_mission == 'true'
        run: |
          git config user.name "SiteSync Strategist"
          git config user.email "strategist@sitesync.ai"

          printf '\n\n---\n*Weekly strategist note \u2014 %s: Active 9-night mission in progress (%s). FEEDBACK.md preserved. Strategist will resume full refresh after April 15th.*\n' "$(date '+%B %d, %Y')" "${{ steps.check_mission.outputs.tonight }}" >> FEEDBACK.md
          git add FEEDBACK.md
          git commit -m "chore(strategy): weekly note — mission active, no overwrite [skip ci]" || true
          git push origin main || true

      - name: Full FEEDBACK.md refresh (no active mission)
        if: steps.check_mission.outputs.active_mission == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          git config user.name "SiteSync Strategist"
          git config user.email "strategist@sitesync.ai"

          claude \
            --dangerously-skip-permissions \
            --model claude-opus-4-6 \
            --max-turns 20 \
            "You are the Chief Product Strategist for SiteSync PM.

          Update FEEDBACK.md with this week's top 3 priorities for the autonomous build organism.

          READ FIRST:
          1. SPEC.md — highest-priority UNCHECKED P0 and P1 criteria
          2. MARKET_INTELLIGENCE.md — what real GCs need urgently
          3. COMPETITIVE.md — what Procore just shipped
          4. LEARNINGS.md — what has worked
          5. .quality-floor.json — current metrics
          6. git log --oneline -20 — what was built this week

          GOOD PRIORITIES:
          - Specific (name the exact file and behavior)
          - Demo-critical (a GC would see this in a 10-minute demo)
          - Completable in one overnight session

          Replace 'Tonight Priorities' section with 3 new specific priorities.
          Keep 'Ongoing Priorities' section unchanged.
          Add today's date.
          Commit: 'strategy: weekly priority refresh [strategist][skip ci]'" || true

      - name: Push
        run: git push origin main 2>/dev/null || true
