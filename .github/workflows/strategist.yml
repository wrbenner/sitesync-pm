name: Weekly Strategist — Refresh Priorities

# Every Sunday at 10pm CDT (3am UTC Monday) — before the 2am organism run
on:
  schedule:
    - cron: '0 3 * * 1'   # 10pm CDT Sunday / 3am UTC Monday
  workflow_dispatch:

permissions:
  contents: write

jobs:
  strategist:
    name: "Refresh FEEDBACK.md"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: rm -f package-lock.json && npm install
      - run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.name "SiteSync Strategist"
          git config user.email "strategist@sitesync.ai"

      - name: Generate fresh priorities
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude \
            --dangerously-skip-permissions \
            --model claude-opus-4-6 \
            --max-turns 20 \
            "You are the Chief Product Strategist for SiteSync PM.

          YOUR MISSION: Update FEEDBACK.md with this week's top 3 priorities for the autonomous build organism.

          READ THESE FILES FIRST:
          1. SPEC.md — find the highest-priority UNCHECKED criteria (focus on P0 and P1)
          2. MARKET_INTELLIGENCE.md — what do real GCs need most urgently
          3. COMPETITIVE.md — what Procore just shipped that we must match or beat
          4. LEARNINGS.md — what patterns have worked
          5. .quality-floor.json — current quality metrics
          6. git log --oneline -20 — what the organism built this week

          CRITERIA FOR GOOD PRIORITIES:
          - Must be specific (name the exact file, function, or behavior)
          - Must be demo-critical (something a GC would see in a 10-minute demo)
          - Must be completable in one overnight session
          - Must move toward a production-ready, sellable product

          UPDATE FEEDBACK.md:
          - Replace 'Tonight's P0 Priorities' section with exactly 3 new priorities
          - Keep the 'Ongoing Priorities' section unchanged
          - Add today's date and 'Updated by Strategist Agent'
          - Make each priority specific enough that a developer could implement it without asking questions

          Commit: 'strategy: weekly priority refresh [strategist][skip ci]'

          Output <promise>DONE</promise> when finished." || true

      - name: Push priorities
        run: |
          COMMITS=$(git log origin/main..HEAD --oneline | wc -l | tr -d ' ')
          if [ "$COMMITS" -gt "0" ]; then
            git push origin main
            echo "Fresh priorities pushed to FEEDBACK.md"
          fi
