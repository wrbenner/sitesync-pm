name: CI (Legacy — replaced by Homeostasis)

# This workflow is disabled. Homeostasis handles CI on every push.
# Kept for manual runs only if needed for debugging.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  legacy-ci:
    name: Legacy CI (manual only)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: rm -f package-lock.json && npm install
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npx vitest run --passWithNoTests
      - run: npm run build
