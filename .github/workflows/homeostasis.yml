name: Homeostasis — Quality Ratchet CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: write
  pull-requests: write
  security-events: write

env:
  NODE_VERSION: '22'

jobs:
  typecheck:
    name: "Gate 1: TypeScript"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install (handles Vite 8 rolldown native bindings)
        run: rm -f package-lock.json && npm install
      - run: npx tsc --noEmit

  lint:
    name: "Gate 2: ESLint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: rm -f package-lock.json && npm install
      - name: Run ESLint
        run: npx eslint . --format json -o /tmp/eslint-report.json || true
      - name: Check for lint errors (warnings are tracked, not blocking)
        run: |
          ERRORS=$(jq '[.[].errorCount] | add // 0' /tmp/eslint-report.json 2>/dev/null || echo "0")
          WARNINGS=$(jq '[.[].warningCount] | add // 0' /tmp/eslint-report.json 2>/dev/null || echo "0")
          FLOOR=$(jq '.eslintWarnings // 9999' .quality-floor.json 2>/dev/null || echo "9999")
          echo "ESLint: $ERRORS errors, $WARNINGS warnings (floor: $FLOOR)"
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::$ERRORS ESLint errors must be fixed"
            exit 1
          fi
          # Ratchet: only fail if warnings INCREASED beyond floor
          if [ "$WARNINGS" -gt "$FLOOR" ] && [ "$FLOOR" -lt 9999 ]; then
            echo "::error::Warnings ($WARNINGS) exceed floor ($FLOOR). Fix new warnings before merging."
            exit 1
          fi

  test:
    name: "Gate 3: Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: rm -f package-lock.json && npm install
      - run: npx vitest run --passWithNoTests --reporter=verbose

  build:
    name: "Gate 4: Build"
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: rm -f package-lock.json && npm install
      - run: npm run build
      - name: Check bundle size ratchet
        run: |
          if [ -d "dist/assets" ]; then
            SIZE=$(find dist/assets -name "*.js" -exec wc -c {} + | tail -1 | awk '{printf "%d", $1/1024}')
            FLOOR=$(jq '.bundleSizeKB // 9999' .quality-floor.json 2>/dev/null || echo "9999")
            echo "Bundle: ${SIZE}KB (floor: ${FLOOR}KB)"
            if [ "$SIZE" -gt "$FLOOR" ] && [ "$FLOOR" -lt 9999 ]; then
              echo "::error::Bundle ${SIZE}KB exceeds floor ${FLOOR}KB"
              exit 1
            fi
          fi

  hygiene:
    name: "Gate 5: Code Hygiene"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Mock data scan
        run: |
          COUNT=$(grep -rn "Math\.random\(\)\|faker\.\|mockData\|MOCK_\|hardcoded" src/ \
            --include="*.ts" --include="*.tsx" 2>/dev/null \
            | grep -v "test\|spec\|__test__\|\.test\.\|// immune-ok" \
            | wc -l | tr -d ' ')
          FLOOR=$(jq '.mockCount // 9999' .quality-floor.json 2>/dev/null || echo "9999")
          echo "Mock instances: $COUNT (floor: $FLOOR)"
          if [ "$COUNT" -gt "$FLOOR" ] && [ "$FLOOR" -lt 9999 ]; then
            echo "::error::Mock data increased: $COUNT instances (floor: $FLOOR)"
            exit 1
          fi
      - name: Type safety scan
        run: |
          COUNT=$(grep -rn "as any\|@ts-ignore" src/ \
            --include="*.ts" --include="*.tsx" 2>/dev/null \
            | grep -v "test\|spec\|// type-safe-ok" \
            | wc -l | tr -d ' ')
          FLOOR=$(jq '.anyCount // 9999' .quality-floor.json 2>/dev/null || echo "9999")
          echo "Unsafe casts: $COUNT (floor: $FLOOR)"
          if [ "$COUNT" -gt "$FLOOR" ] && [ "$FLOOR" -lt 9999 ]; then
            echo "::error::Unsafe casts increased: $COUNT (floor: $FLOOR)"
            exit 1
          fi

  # Auto-update quality floor when metrics improve
  update-floor:
    name: "Update Quality Floor"
    needs: [typecheck, lint, test, build, hygiene]
    if: success() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: rm -f package-lock.json && npm install
      - name: Run metrics and update floor if improved
        run: |
          git config user.name "SiteSync CI"
          git config user.email "ci@sitesync.ai"
          
          # Get current metrics
          npx eslint . --format json -o /tmp/eslint-report.json 2>/dev/null || true
          WARNINGS=$(jq '[.[].warningCount] | add // 0' /tmp/eslint-report.json 2>/dev/null || echo "0")
          
          MOCKS=$(grep -rn "Math\.random\(\)\|faker\.\|mockData\|MOCK_" src/ \
            --include="*.ts" --include="*.tsx" 2>/dev/null \
            | grep -v "test\|spec\|__test__" | wc -l | tr -d ' ')
          
          ANYCASTS=$(grep -rn "as any\|@ts-ignore" src/ \
            --include="*.ts" --include="*.tsx" 2>/dev/null \
            | grep -v "test\|spec" | wc -l | tr -d ' ')
          
          npm run build 2>/dev/null || true
          SIZE=$(find dist/assets -name "*.js" -exec wc -c {} + 2>/dev/null | tail -1 | awk '{printf "%d", $1/1024}' || echo "0")
          
          # Read current floor
          FLOOR_WARNINGS=$(jq '.eslintWarnings // 9999' .quality-floor.json)
          FLOOR_MOCKS=$(jq '.mockCount // 9999' .quality-floor.json)
          FLOOR_ANY=$(jq '.anyCount // 9999' .quality-floor.json)
          FLOOR_BUNDLE=$(jq '.bundleSizeKB // 9999' .quality-floor.json)
          
          UPDATED=false
          
          # Update floor if any metric improved
          if [ "$WARNINGS" -lt "$FLOOR_WARNINGS" ]; then
            jq ".eslintWarnings = $WARNINGS | ._updated = \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"" .quality-floor.json > /tmp/qf.json && mv /tmp/qf.json .quality-floor.json
            echo "ESLint warnings improved: $FLOOR_WARNINGS → $WARNINGS"
            UPDATED=true
          fi
          if [ "$MOCKS" -lt "$FLOOR_MOCKS" ]; then
            jq ".mockCount = $MOCKS | ._updated = \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"" .quality-floor.json > /tmp/qf.json && mv /tmp/qf.json .quality-floor.json
            echo "Mock count improved: $FLOOR_MOCKS → $MOCKS"
            UPDATED=true
          fi
          if [ "$ANYCASTS" -lt "$FLOOR_ANY" ]; then
            jq ".anyCount = $ANYCASTS | ._updated = \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"" .quality-floor.json > /tmp/qf.json && mv /tmp/qf.json .quality-floor.json
            echo "Any casts improved: $FLOOR_ANY → $ANYCASTS"
            UPDATED=true
          fi
          if [ "$SIZE" -gt 0 ] && [ "$SIZE" -lt "$FLOOR_BUNDLE" ]; then
            jq ".bundleSizeKB = $SIZE | ._updated = \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"" .quality-floor.json > /tmp/qf.json && mv /tmp/qf.json .quality-floor.json
            echo "Bundle size improved: $FLOOR_BUNDLE → ${SIZE}KB"
            UPDATED=true
          fi
          
          if [ "$UPDATED" = "true" ]; then
            git add .quality-floor.json
            git commit -m "chore(ci): update quality floor with improved metrics [skip ci]"
            git push origin main || true
          fi
