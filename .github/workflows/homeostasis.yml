name: Homeostasis — Quality Ratchet CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: write
  pull-requests: write

env:
  NODE_VERSION: '22'

jobs:
  typecheck:
    name: "Gate 1: TypeScript"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: rm -f package-lock.json && npm install
      - run: npx tsc --noEmit

  lint:
    name: "Gate 2: ESLint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: rm -f package-lock.json && npm install
      - name: Run ESLint on src/ only (not .claude/worktrees)
        run: npx eslint "src/**/*.{ts,tsx}" --format json -o /tmp/eslint-report.json || true
      - name: Check ESLint ratchet (fail only if errors INCREASE)
        run: |
          ERRORS=$(jq '[.[].errorCount] | add // 0' /tmp/eslint-report.json 2>/dev/null || echo "0")
          WARNINGS=$(jq '[.[].warningCount] | add // 0' /tmp/eslint-report.json 2>/dev/null || echo "0")
          ERROR_FLOOR=$(jq '.eslintErrors // 9999' .quality-floor.json 2>/dev/null || echo "9999")
          WARN_FLOOR=$(jq '.eslintWarnings // 9999' .quality-floor.json 2>/dev/null || echo "9999")
          echo "ESLint: $ERRORS errors (floor: $ERROR_FLOOR), $WARNINGS warnings (floor: $WARN_FLOOR)"
          if [ "$ERRORS" -gt "$ERROR_FLOOR" ] && [ "$ERROR_FLOOR" -lt 9999 ]; then
            echo "::error::ESLint errors increased: $ERRORS (floor: $ERROR_FLOOR)"
            exit 1
          fi
          if [ "$WARNINGS" -gt "$WARN_FLOOR" ] && [ "$WARN_FLOOR" -lt 9999 ]; then
            echo "::error::ESLint warnings increased: $WARNINGS (floor: $WARN_FLOOR)"
            exit 1
          fi

  test:
    name: "Gate 3: Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: rm -f package-lock.json && npm install
      - name: Run unit tests (skip Supabase-dependent tests)
        run: |
          npx vitest run \
            --passWithNoTests \
            --reporter=verbose \
            --exclude "src/test/integration/**" \
            --exclude "src/test/api/**" \
            --exclude "src/test/permissions.test.ts"

  build:
    name: "Gate 4: Build"
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: rm -f package-lock.json && npm install
      - run: npm run build
      - name: Bundle size ratchet
        run: |
          if [ -d "dist/assets" ]; then
            LARGEST=$(find dist/assets -name "*.js" ! -name "*.map" -exec wc -c {} \; 2>/dev/null | sort -rn | head -1 | awk '{printf "%d", $1/1024}')
            FLOOR=$(jq '.bundleSizeKB // 9999' .quality-floor.json 2>/dev/null || echo "9999")
            echo "Largest chunk: ${LARGEST}KB (floor: ${FLOOR}KB)"
            if [ "$LARGEST" -gt "$FLOOR" ] && [ "$FLOOR" -lt 9999 ]; then
              echo "::error::Chunk ${LARGEST}KB exceeds floor ${FLOOR}KB"
              exit 1
            fi
          fi

  hygiene:
    name: "Gate 5: Code Hygiene"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Mock data ratchet
        run: |
          COUNT=$(grep -rn "Math\.random()\|mockData\|MOCK_" src/ \
            --include="*.ts" --include="*.tsx" 2>/dev/null \
            | grep -v "test\|spec\|__test__\|// immune-ok" | wc -l | tr -d ' ')
          FLOOR=$(jq '.mockCount // 9999' .quality-floor.json 2>/dev/null || echo "9999")
          echo "Mock instances: $COUNT (floor: $FLOOR)"
          if [ "$COUNT" -gt "$FLOOR" ] && [ "$FLOOR" -lt 9999 ]; then
            echo "::error::Mock data increased: $COUNT (was $FLOOR)"
            exit 1
          fi
      - name: Type safety ratchet
        run: |
          COUNT=$(grep -rn "as any\|@ts-ignore" src/ \
            --include="*.ts" --include="*.tsx" 2>/dev/null \
            | grep -v "test\|spec\|// type-safe-ok" | wc -l | tr -d ' ')
          FLOOR=$(jq '.anyCount // 9999' .quality-floor.json 2>/dev/null || echo "9999")
          echo "Unsafe casts: $COUNT (floor: $FLOOR)"
          if [ "$COUNT" -gt "$FLOOR" ] && [ "$FLOOR" -lt 9999 ]; then
            echo "::error::Unsafe casts increased: $COUNT (was $FLOOR)"
            exit 1
          fi

  update-floor:
    name: "Update Quality Floor"
    needs: [typecheck, lint, test, build, hygiene]
    if: success() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: rm -f package-lock.json && npm install
      - name: Measure and ratchet quality floor
        run: |
          git config user.name "SiteSync CI"
          git config user.email "ci@sitesync.ai"

          npx eslint "src/**/*.{ts,tsx}" --format json -o /tmp/e.json 2>/dev/null || true
          E=$(jq '[.[].errorCount] | add // 0' /tmp/e.json 2>/dev/null || echo "0")
          W=$(jq '[.[].warningCount] | add // 0' /tmp/e.json 2>/dev/null || echo "0")

          M=$(grep -rn "Math\.random()\|mockData\|MOCK_" src/ --include="*.ts" --include="*.tsx" 2>/dev/null | grep -v "test\|spec\|// immune-ok" | wc -l | tr -d ' ')
          A=$(grep -rn "as any\|@ts-ignore" src/ --include="*.ts" --include="*.tsx" 2>/dev/null | grep -v "test\|spec\|// type-safe-ok" | wc -l | tr -d ' ')

          npm run build 2>/dev/null || true
          B=$(find dist/assets -name "*.js" ! -name "*.map" -exec wc -c {} \; 2>/dev/null | sort -rn | head -1 | awk '{printf "%d", $1/1024}' || echo "0")

          python3 - "$E" "$W" "$M" "$A" "$B" << 'PYEOF'
          import sys, json
          e,w,m,a,b = [int(x) for x in sys.argv[1:]]
          with open('.quality-floor.json') as f:
              floor = json.load(f)
          updated = False
          def ratchet(key, val, label):
              global updated
              if val == 0: return
              cur = floor.get(key, 9999)
              if val < cur:
                  print(f"  {label}: {cur} -> {val}")
                  floor[key] = val
                  updated = True
          ratchet('eslintErrors', e, 'ESLint errors')
          ratchet('eslintWarnings', w, 'ESLint warnings')
          ratchet('mockCount', m, 'Mock instances')
          ratchet('anyCount', a, 'Unsafe casts')
          ratchet('bundleSizeKB', b, 'Bundle KB')
          if updated:
              from datetime import datetime, timezone
              floor['_updated'] = datetime.now(timezone.utc).isoformat()
              with open('.quality-floor.json', 'w') as f:
                  json.dump(floor, f, indent=2)
          PYEOF

      - name: Commit floor if improved
        run: |
          if ! git diff --quiet .quality-floor.json; then
            git add .quality-floor.json
            git commit -m "chore(ci): ratchet quality floor [skip ci]"
            git push origin main || true
          fi
