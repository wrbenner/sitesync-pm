name: Homeostasis — Quality Ratchet CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: write
  pull-requests: write
  security-events: write

env:
  NODE_VERSION: '22'

jobs:
  typecheck:
    name: "Gate 1: TypeScript"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install (Vite 8 rolldown needs npm install not npm ci)
        run: rm -f package-lock.json && npm install
      - run: npx tsc --noEmit

  lint:
    name: "Gate 2: ESLint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: rm -f package-lock.json && npm install
      - name: Run ESLint on src/ only
        run: npx eslint "src/**/*.{ts,tsx}" --format json -o /tmp/eslint-report.json || true
      - name: Check ESLint errors
        run: |
          ERRORS=$(jq '[.[].errorCount] | add // 0' /tmp/eslint-report.json 2>/dev/null || echo "0")
          WARNINGS=$(jq '[.[].warningCount] | add // 0' /tmp/eslint-report.json 2>/dev/null || echo "0")
          FLOOR=$(jq '.eslintWarnings // 9999' .quality-floor.json 2>/dev/null || echo "9999")
          echo "ESLint: $ERRORS errors, $WARNINGS warnings (floor: $FLOOR)"
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::$ERRORS ESLint errors must be fixed"
            exit 1
          fi
          if [ "$WARNINGS" -gt "$FLOOR" ] && [ "$FLOOR" -lt 9999 ]; then
            echo "::error::Warnings ($WARNINGS) exceed floor ($FLOOR)"
            exit 1
          fi

  test:
    name: "Gate 3: Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: rm -f package-lock.json && npm install
      - name: Run unit tests (excluding integration tests needing Supabase)
        run: npx vitest run --passWithNoTests --reporter=verbose --exclude "src/test/integration/**"

  build:
    name: "Gate 4: Build"
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: rm -f package-lock.json && npm install
      - run: npm run build
      - name: Bundle size ratchet (largest single chunk)
        run: |
          if [ -d "dist/assets" ]; then
            LARGEST=$(find dist/assets -name "*.js" ! -name "*.map" -exec wc -c {} \; 2>/dev/null | sort -n | tail -1 | awk '{printf "%d", $1/1024}')
            FLOOR=$(jq '.bundleSizeKB // 9999' .quality-floor.json 2>/dev/null || echo "9999")
            echo "Largest chunk: ${LARGEST}KB (floor: ${FLOOR}KB)"
            if [ "$LARGEST" -gt "$FLOOR" ] && [ "$FLOOR" -lt 9999 ]; then
              echo "::error::Largest chunk ${LARGEST}KB exceeds floor ${FLOOR}KB"
              exit 1
            fi
          fi

  hygiene:
    name: "Gate 5: Code Hygiene"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Mock data scan (src/ only)
        run: |
          COUNT=$(grep -rn "Math\.random()\|faker\.\|mockData\|MOCK_" src/ \
            --include="*.ts" --include="*.tsx" 2>/dev/null \
            | grep -v "test\|spec\|__test__\|// immune-ok" \
            | wc -l | tr -d ' ')
          FLOOR=$(jq '.mockCount // 9999' .quality-floor.json 2>/dev/null || echo "9999")
          echo "Mock instances: $COUNT (floor: $FLOOR)"
          if [ "$COUNT" -gt "$FLOOR" ] && [ "$FLOOR" -lt 9999 ]; then
            echo "::error::Mock data increased: $COUNT (was $FLOOR)"
            exit 1
          fi
      - name: Type safety scan (src/ only)
        run: |
          COUNT=$(grep -rn "as any\|@ts-ignore" src/ \
            --include="*.ts" --include="*.tsx" 2>/dev/null \
            | grep -v "test\|spec\|// type-safe-ok" \
            | wc -l | tr -d ' ')
          FLOOR=$(jq '.anyCount // 9999' .quality-floor.json 2>/dev/null || echo "9999")
          echo "Unsafe casts: $COUNT (floor: $FLOOR)"
          if [ "$COUNT" -gt "$FLOOR" ] && [ "$FLOOR" -lt 9999 ]; then
            echo "::error::Unsafe casts increased: $COUNT (was $FLOOR)"
            exit 1
          fi

  update-floor:
    name: "Update Quality Floor"
    needs: [typecheck, lint, test, build, hygiene]
    if: success() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: rm -f package-lock.json && npm install
      - name: Auto-update quality floor with current metrics
        run: |
          git config user.name "SiteSync CI"
          git config user.email "ci@sitesync.ai"

          npx eslint "src/**/*.{ts,tsx}" --format json -o /tmp/eslint.json 2>/dev/null || true
          WARNINGS=$(jq '[.[].warningCount] | add // 0' /tmp/eslint.json 2>/dev/null || echo "0")

          MOCKS=$(grep -rn "Math\.random()\|mockData\|MOCK_" src/ \
            --include="*.ts" --include="*.tsx" 2>/dev/null \
            | grep -v "test\|spec\|// immune-ok" | wc -l | tr -d ' ')

          ANY=$(grep -rn "as any\|@ts-ignore" src/ \
            --include="*.ts" --include="*.tsx" 2>/dev/null \
            | grep -v "test\|spec\|// type-safe-ok" | wc -l | tr -d ' ')

          npm run build 2>/dev/null || true
          LARGEST=$(find dist/assets -name "*.js" ! -name "*.map" -exec wc -c {} \; 2>/dev/null | sort -n | tail -1 | awk '{printf "%d", $1/1024}' || echo "0")

          python3 << PYEOF
          import json, os
          with open('.quality-floor.json') as f:
              floor = json.load(f)
          updated = False
          def improve(key, val):
              global updated
              cur = floor.get(key, 9999)
              if val > 0 and val < cur:
                  floor[key] = val
                  updated = True
                  print(f"  {key}: {cur} -> {val}")
          improve('eslintWarnings', int(os.environ.get('WARNINGS', 9999)))
          improve('mockCount', int(os.environ.get('MOCKS', 9999)))
          improve('anyCount', int(os.environ.get('ANY', 9999)))
          improve('bundleSizeKB', int(os.environ.get('LARGEST', 9999)))
          if updated:
              floor['_updated'] = '$(date -u +%Y-%m-%dT%H:%M:%SZ)'
              with open('.quality-floor.json', 'w') as f:
                  json.dump(floor, f, indent=2)
              print("Quality floor updated")
          PYEOF
        env:
          WARNINGS: "0"
          MOCKS: "0"
          ANY: "0"
          LARGEST: "0"

      - name: Commit updated floor
        run: |
          if git diff --quiet .quality-floor.json; then
            echo "No floor changes"
          else
            git add .quality-floor.json
            git commit -m "chore(ci): auto-update quality floor [skip ci]"
            git push origin main || true
          fi
