name: Agent Swarm — Parallel Build

# Swarm runs at 8am and 2pm CDT (testing + polish waves)
# Nightly-build handles 2am (implement wave)
# Parallel agents create PRs that auto-merge when CI passes
on:
  schedule:
    - cron: '0 13 * * *'   # 8:00 AM CDT — testing wave
    - cron: '0 19 * * *'   # 2:00 PM CDT — polish wave
  workflow_dispatch:
    inputs:
      agents:
        description: 'Agents to run: all | alpha,beta,gamma,delta,echo'
        default: 'all'
      wave:
        description: 'Wave: implement | test | polish | verify'
        default: 'test'

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  NODE_VERSION: '22'

jobs:
  wave-setup:
    name: "Setup"
    runs-on: ubuntu-latest
    outputs:
      wave: ${{ steps.config.outputs.wave }}
      agents: ${{ steps.config.outputs.agents }}
    steps:
      - id: config
        run: |
          HOUR=$(date -u +%H)
          INPUT_WAVE="${{ github.event.inputs.wave }}"
          INPUT_AGENTS="${{ github.event.inputs.agents }}"

          if [ -n "$INPUT_WAVE" ]; then
            WAVE="$INPUT_WAVE"
          elif [ "$HOUR" -eq "13" ]; then
            WAVE="test"
          else
            WAVE="polish"
          fi

          if [ "$INPUT_AGENTS" = "all" ] || [ -z "$INPUT_AGENTS" ]; then
            AGENTS='["alpha","beta","gamma","delta","echo"]'
          else
            AGENTS=$(echo "$INPUT_AGENTS" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read().strip().split(',')))")
          fi

          echo "wave=$WAVE" >> $GITHUB_OUTPUT
          echo "agents=$AGENTS" >> $GITHUB_OUTPUT

  agent:
    name: "Agent ${{ matrix.agent }}"
    needs: wave-setup
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      matrix:
        agent: ${{ fromJson(needs.wave-setup.outputs.agents) }}
      max-parallel: 5
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci
      - run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.name "SiteSync Agent ${{ matrix.agent }}"
          git config user.email "agent-${{ matrix.agent }}@sitesync.ai"

      - name: Create isolated branch
        run: |
          BRANCH="auto/${{ matrix.agent }}-$(date +%Y%m%d-%H%M)"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Run agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          AGENT="${{ matrix.agent }}"
          WAVE="${{ needs.wave-setup.outputs.wave }}"
          FEEDBACK=$(cat FEEDBACK.md 2>/dev/null | head -20 || echo "")
          ASSIGNMENTS=$(grep -A 40 "## Agent $(echo ${AGENT^})" MODULE_ASSIGNMENTS.md 2>/dev/null | head -40 || echo "No assignments found")

          case "$WAVE" in
            "test")     MISSION="Write unit tests (Vitest) for untested code in your module assignments. Do NOT change implementation. Only write test files." ;;
            "polish")   MISSION="Fix accessibility violations (axe-core), add loading skeletons, improve empty states. Only touch your assigned files." ;;
            "implement") MISSION="Implement the next unchecked acceptance criteria in SPEC.md within your module assignments." ;;
            "verify")   MISSION="Adversarially test your module assignments. Try to break things. Uncheck failing SPEC.md criteria." ;;
          esac

          claude \
            --dangerously-skip-permissions \
            --model claude-sonnet-4-6 \
            --max-turns 40 \
            "You are Agent ${AGENT^^} for SiteSync PM.

          YOUR ASSIGNED FILES (from MODULE_ASSIGNMENTS.md):
          $ASSIGNMENTS

          FOUNDER PRIORITIES (FEEDBACK.md):
          $FEEDBACK

          YOUR MISSION ($WAVE wave): $MISSION

          RULES:
          - ONLY touch files in your module assignments
          - Run quality gates before each commit: npx tsc --noEmit && npm run lint && npx vitest run --passWithNoTests && npm run build
          - Commit format: feat(scope): description [auto-${AGENT}]
          - Update SPEC.md checkboxes when criteria are complete
          - Add patterns to LEARNINGS.md
          - Output <promise>DONE</promise> when finished" || true

      - name: Push branch and create auto-merging PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMITS=$(git log origin/main..HEAD --oneline 2>/dev/null | wc -l | tr -d ' ')

          if [ "$COMMITS" -gt "0" ]; then
            git push origin "$BRANCH"

            # Create PR
            PR_URL=$(gh pr create \
              --title "[auto-${{ matrix.agent }}] ${{ needs.wave-setup.outputs.wave }} — $(date +%Y-%m-%d)" \
              --body "$(git log origin/main..HEAD --oneline)" \
              --base main \
              --head "$BRANCH" \
              --label "auto-generated" \
              --label "agent-${{ matrix.agent }}" 2>/dev/null)

            if [ -n "$PR_URL" ]; then
              PR_NUM=$(echo "$PR_URL" | grep -o '[0-9]*$')
              echo "PR #$PR_NUM created: $PR_URL"

              # Enable auto-merge immediately — merges when CI passes, no human needed
              gh pr merge "$PR_NUM" --auto --squash --delete-branch 2>/dev/null \
                && echo "Auto-merge enabled on PR #$PR_NUM" \
                || echo "Auto-merge setup failed (will retry in auto-merge job)"
            fi
          else
            echo "Agent ${{ matrix.agent }}: no changes"
          fi

      - name: Summary
        if: always()
        run: |
          COMMITS=$(git log origin/main..HEAD --oneline 2>/dev/null | wc -l | tr -d ' ')
          echo "## Agent ${{ matrix.agent }} — $COMMITS commits" >> $GITHUB_STEP_SUMMARY
          git log origin/main..HEAD --oneline >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "None" >> $GITHUB_STEP_SUMMARY

  auto-merge-cleanup:
    name: "Auto-merge remaining PRs"
    needs: agent
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge any approved auto-generated PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Merge any PRs where all checks have passed
          gh pr list \
            --label "auto-generated" \
            --state open \
            --json number,statusCheckRollup \
            --jq '.[] | select(.statusCheckRollup | length > 0) | select([.statusCheckRollup[].state] | all(. == "SUCCESS")) | .number' \
          2>/dev/null | while read PR; do
            echo "Merging PR #$PR"
            gh pr merge "$PR" --squash --delete-branch 2>/dev/null || true
          done || true
