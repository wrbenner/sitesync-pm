name: Agent Swarm — Test & Polish

# Swarm runs at 8am (test wave) and 2pm (polish wave) CDT
# NEVER implements features — that is the organism's job
# Tests what the organism built, polishes UX, finds bugs
on:
  schedule:
    - cron: '0 13 * * *'   # 8:00 AM CDT — test wave
    - cron: '0 19 * * *'   # 2:00 PM CDT — polish wave
  workflow_dispatch:
    inputs:
      agents:
        description: 'Agents: all | alpha,beta,gamma,delta,echo'
        default: 'all'
      wave:
        description: 'Wave: test | polish'
        default: 'test'

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  NODE_VERSION: '22'

jobs:
  wave-setup:
    name: "Setup"
    runs-on: ubuntu-latest
    outputs:
      wave: ${{ steps.config.outputs.wave }}
      agents: ${{ steps.config.outputs.agents }}
    steps:
      - id: config
        run: |
          HOUR=$(date -u +%H)
          INPUT_WAVE="${{ github.event.inputs.wave }}"
          INPUT_AGENTS="${{ github.event.inputs.agents }}"
          if [ -n "$INPUT_WAVE" ]; then WAVE="$INPUT_WAVE"
          elif [ "$HOUR" -eq "13" ]; then WAVE="test"
          else WAVE="polish"; fi
          if [ "$INPUT_AGENTS" = "all" ] || [ -z "$INPUT_AGENTS" ]; then
            AGENTS='["alpha","beta","gamma","delta","echo"]'
          else
            AGENTS=$(python3 -c "import sys,json; print(json.dumps('$INPUT_AGENTS'.split(',')))")
          fi
          echo "wave=$WAVE" >> $GITHUB_OUTPUT
          echo "agents=$AGENTS" >> $GITHUB_OUTPUT

  agent:
    name: "Agent ${{ matrix.agent }}"
    needs: wave-setup
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      matrix:
        agent: ${{ fromJson(needs.wave-setup.outputs.agents) }}
      max-parallel: 5
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: main

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: npm ci
      - run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.name "SiteSync Agent ${{ matrix.agent }}"
          git config user.email "agent-${{ matrix.agent }}@sitesync.ai"

      - name: Create isolated branch
        run: |
          BRANCH="auto/${{ matrix.agent }}-$(date +%Y%m%d-%H%M)"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Gather context
        id: context
        run: |
          # What did the organism change last night?
          ORGANISM_COMMITS=$(git log --since="12 hours ago" --author="SiteSync Organism" --oneline 2>/dev/null || echo "none")
          echo "ORGANISM_COMMITS<<EOF" >> $GITHUB_ENV
          echo "$ORGANISM_COMMITS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          # Which experiments passed?
          PASSED_EXPERIMENTS=$(grep "✅" EXPERIMENTS.md 2>/dev/null | head -15 || echo "No experiment data")
          echo "PASSED_EXPERIMENTS<<EOF" >> $GITHUB_ENV
          echo "$PASSED_EXPERIMENTS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Run agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          AGENT="${{ matrix.agent }}"
          WAVE="${{ needs.wave-setup.outputs.wave }}"
          ASSIGNMENTS=$(grep -A 50 "## Agent $(python3 -c "print('$AGENT'.capitalize())")" MODULE_ASSIGNMENTS.md 2>/dev/null | head -50 || echo "Work on any file in your area")

          case "$WAVE" in
            "test")
              MISSION="Write comprehensive unit tests (Vitest) for code in your module assignments.

          PRIORITY ORDER:
          1. Files the organism changed last night (highest priority — test new code):
             $ORGANISM_COMMITS

          2. Experiments that passed (verify they actually work correctly):
             $PASSED_EXPERIMENTS

          3. Untested files from .metrics/untested-files.json (read it)

          FOR EACH TEST FILE:
          - Test the happy path (normal usage)
          - Test edge cases: empty inputs, null/undefined, boundary values
          - Test error states: network failures, invalid data
          - For UI components: test render, user interactions, accessibility
          - Name tests descriptively: 'should [behavior] when [condition]'

          TARGET: Every source file you touch gets at least 1 meaningful test file." ;;

            "polish")
              MISSION="Polish the UI/UX in your module assignments. This is a construction app used on job sites.

          FOCUS AREAS (in order):
          1. Touch targets: ALL interactive elements must be 56px minimum (gloved hands)
          2. Loading states: Suspense boundaries + skeleton loaders on every async view
          3. Empty states: helpful message + CTA when no data exists
          4. Error boundaries: graceful error UI, never a white/blank screen
          5. Accessibility: aria-labels, keyboard nav, focus management, color contrast
          6. Mobile responsiveness: test at 375px width minimum

          Read CLAUDE.md and v7-prompts/V7-00_SYSTEM_CONTEXT.md for V7 design rules.
          No hyphens in UI text. Inline styles only from theme.ts. 56px touch targets." ;;
          esac

          claude \
            --dangerously-skip-permissions \
            --model claude-sonnet-4-6 \
            --max-turns 60 \
            "You are Agent ${AGENT^^} for SiteSync PM — a construction project management platform.

          ====================================================================
          ABSOLUTE RULE: You are a $WAVE agent. You NEVER implement new features.
          You NEVER write new business logic. You NEVER add new pages or routes.
          If you catch yourself doing any of these, STOP and refocus.
          The organism handles all feature implementation via EXPERIMENTS.md.
          ====================================================================

          YOUR ASSIGNED MODULES:
          $ASSIGNMENTS

          YOUR MISSION ($WAVE wave):
          $MISSION

          KEY PROJECT RULES (do NOT spend turns reading CLAUDE.md — these are the essentials):
          - Stack: React 19 + TypeScript + Vite 8 + Supabase + Vercel
          - Touch targets: 56px minimum (industrial gloved use, NOT the standard 44px)
          - No hyphens in any UI-facing text
          - All inline styles must come from theme.ts
          - Test framework: Vitest (NOT Jest). Import from 'vitest'
          - Build tool: Vite 8 with Rolldown. Use 'npm run build' not 'vite build'
          - Use 'npm ci' if node_modules missing
          - Read LEARNINGS.md for known pitfalls (quick read, only 10KB)

          QUALITY GATES (before every commit):
            npx tsc --noEmit && npm run lint && npx vitest run --passWithNoTests && npm run build

          COMMIT FORMAT: $WAVE(\$scope): description [auto-${AGENT}]

          HARD BOUNDARIES (violating these = wasted work that gets reverted):
          - NEVER implement new features, business logic, or API endpoints
          - NEVER touch files outside your module assignments
          - NEVER modify EXPERIMENTS.md, FEEDBACK.md, DAILY_REPORT.md, or TONIGHT.md
          - NEVER create or modify database migrations
          - NEVER modify workflow files (.github/workflows/*)
          - If a test reveals a BUG: write the failing test, commit it, move on.
            The organism will fix the bug in its next experiment cycle.

          Output <promise>DONE</promise> when finished." || true

      - name: Push and create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMITS=$(git log origin/main..HEAD --oneline 2>/dev/null | wc -l | tr -d ' ')
          if [ "$COMMITS" -gt "0" ]; then
            git push origin "$BRANCH"
            PR_URL=$(gh pr create \
              --title "[auto-${{ matrix.agent }}] ${{ needs.wave-setup.outputs.wave }} — $(date +%Y-%m-%d)" \
              --body "## Agent ${{ matrix.agent }} — ${{ needs.wave-setup.outputs.wave }} wave

          $(git log origin/main..HEAD --oneline)" \
              --base main \
              --head "$BRANCH" \
              --label "auto-generated" \
              --label "agent-${{ matrix.agent }}" 2>/dev/null)
            if [ -n "$PR_URL" ]; then
              PR_NUM=$(echo "$PR_URL" | grep -o '[0-9]*$')
              echo "PR created — awaiting review (auto-merge disabled)"
              echo "PR #$PR_NUM created with auto-merge"
            fi
          else
            echo "Agent ${{ matrix.agent }}: no changes produced"
          fi
