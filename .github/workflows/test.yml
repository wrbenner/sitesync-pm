name: Test + Audit

# INFORMATIONAL ONLY. Not a required status check. The two checks in
# this workflow (Vitest + tsc) duplicate homeostasis.yml's Gate 1
# (TypeScript) and Gate 3 (Tests) — both of which ARE required and
# carry the load on PRs. Running this workflow on PRs adds noise
# without signal. Kept on push-to-main + workflow_dispatch for
# historical artifact / on-demand re-runs.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Vitest + tsc + audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check (both project configs)
        run: npm run typecheck

      - name: Vitest run
        run: npx vitest run --passWithNoTests --reporter=default --reporter=junit --outputFile=./vitest-junit.xml --exclude "src/test/integration/**" --exclude "src/test/api/**" --exclude "src/test/permissions.test.ts"

      - name: Static audit
        run: npx tsx scripts/audit.ts

      - name: RFI audit-chain coverage gate
        run: npm run validate:rfi-audit

      - name: RFI voice linter gate
        run: npx -y tsx scripts/lint-rfi-voice.ts

      - name: Page-test drift guard
        run: |
          npx tsx scripts/generate-page-tests.ts
          if [[ -n "$(git status --porcelain src/test/pages/smoke)" ]]; then
            echo "::error::Generated smoke tests are out of date. Run: npx tsx scripts/generate-page-tests.ts"
            git diff src/test/pages/smoke
            exit 1
          fi

      # Coverage posting left out deliberately: @vitest/coverage-v8 is not
      # currently in devDependencies. Add it + reenable in a follow-up PR.
