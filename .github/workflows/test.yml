name: Test + Audit

# INFORMATIONAL ONLY. Not a required status check. The two checks in
# this workflow (Vitest + tsc) duplicate homeostasis.yml's Gate 1
# (TypeScript) and Gate 3 (Tests) — both of which ARE required and
# carry the load on PRs. Running this workflow on PRs adds noise
# without signal. Kept on push-to-main + workflow_dispatch for
# historical artifact / on-demand re-runs.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Vitest + tsc + audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check (both project configs)
        run: npm run typecheck

      - name: Vitest run
        run: npx vitest run --passWithNoTests --reporter=default --reporter=junit --outputFile=./vitest-junit.xml --exclude "src/test/integration/**" --exclude "src/test/api/**" --exclude "src/test/permissions.test.ts"

      - name: Static audit
        run: npx tsx scripts/audit.ts

      - name: RFI audit-chain coverage gate
        run: npm run validate:rfi-audit

      - name: RFI voice linter gate
        run: npx -y tsx scripts/lint-rfi-voice.ts

      # Bugatti Phase L+O: extends the RFI voice linter to every UI string
      # across src/ (RFI files excluded — covered by the gate above). The
      # initial baseline violation set was driven to 0 in Phase O via a
      # full em-dash/en-dash sweep + a fix to the voice-linter rule itself
      # (previous regex matched ASCII hyphens; now uses U+2014/U+2013).
      # Gate is hard-fail going forward.
      - name: UI voice linter gate (non-RFI surfaces)
        run: npx -y tsx scripts/lint-ui-voice.ts

      # Bugatti Phase L: prevent regression of the unguarded-mutation
      # findings the May-4 audit surfaced. The mjs script diffs current
      # unguarded-action counts against scripts/.permission-gate-snapshot.json
      # and fails CI if any feature area regresses. continue-on-error true
      # for now so a baseline-refresh PR is not blocked while Walker reviews.
      - name: PermissionGate regression gate
        run: node scripts/audit-permission-gate.mjs
        continue-on-error: true

      - name: Page-test drift guard
        run: |
          npx tsx scripts/generate-page-tests.ts
          if [[ -n "$(git status --porcelain src/test/pages/smoke)" ]]; then
            echo "::error::Generated smoke tests are out of date. Run: npx tsx scripts/generate-page-tests.ts"
            git diff src/test/pages/smoke
            exit 1
          fi

      # Coverage posting left out deliberately: @vitest/coverage-v8 is not
      # currently in devDependencies. Add it + reenable in a follow-up PR.
