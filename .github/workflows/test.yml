name: Test + Audit

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Vitest + tsc + audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Vitest run
        run: npx vitest run --passWithNoTests --reporter=default --reporter=junit --outputFile=./vitest-junit.xml --exclude "src/test/integration/**" --exclude "src/test/api/**" --exclude "src/test/permissions.test.ts"

      - name: Static audit
        run: npx tsx scripts/audit.ts

      - name: Page-test drift guard
        run: |
          npx tsx scripts/generate-page-tests.ts
          if [[ -n "$(git status --porcelain src/test/pages/smoke)" ]]; then
            echo "::error::Generated smoke tests are out of date. Run: npx tsx scripts/generate-page-tests.ts"
            git diff src/test/pages/smoke
            exit 1
          fi

      # Coverage posting left out deliberately: @vitest/coverage-v8 is not
      # currently in devDependencies. Add it + reenable in a follow-up PR.
