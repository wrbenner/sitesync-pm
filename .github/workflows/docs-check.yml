name: docs-check

# INFORMATIONAL ONLY. Not a required status check (per branch protection
# on main, which requires only Gate 1-4 + Eval Layer 1-2). Pre-existing
# stale links in old audit docs cause it to fail consistently; moving it
# off the pull_request trigger keeps the PR view clean while still
# surfacing regressions on push-to-main runs.
#
# To run on a PR explicitly, use workflow_dispatch from the Actions tab.
on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'scripts/check-doc-links.ts'
      - 'scripts/generate-doc-index.ts'
      - '.github/workflows/docs-check.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest
    # Non-blocking: pre-existing stale links in audit docs (UX_BUGATTI_*).
    # Failures still surface in PR checks but don't gate merges.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run docs link checker
        run: npx --yes tsx scripts/check-doc-links.ts
