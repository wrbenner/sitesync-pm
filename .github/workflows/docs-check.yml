name: docs-check

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'scripts/check-doc-links.ts'
      - 'scripts/generate-doc-index.ts'
      - '.github/workflows/docs-check.yml'
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'scripts/check-doc-links.ts'
      - 'scripts/generate-doc-index.ts'
      - '.github/workflows/docs-check.yml'

permissions:
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run docs link checker
        run: npx --yes tsx scripts/check-doc-links.ts
