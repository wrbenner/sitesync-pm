name: Progress Report — April 15th Readiness

# Runs every 3 days to report how far the organism has gotten
on:
  schedule:
    - cron: '0 14 9,12,14 4 *'  # April 9, 12, 14 at 2pm UTC (9am CDT)
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  report:
    name: "Progress Snapshot"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Count SPEC progress
        id: spec
        run: |
          CHECKED=$(grep -c "^\- \[x\]" SPEC.md 2>/dev/null || echo "0")
          TOTAL=$(grep -c "^\- \[" SPEC.md 2>/dev/null || echo "431")
          echo "checked=$CHECKED" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          PCT=$((CHECKED * 100 / TOTAL))
          echo "pct=$PCT" >> $GITHUB_OUTPUT

      - name: Check demo-critical pages
        id: demo
        run: |
          # Check for remaining mock data on the 6 demo pages
          MOCKS=0
          for page in "Dashboard" "AICopilot" "RFIs" "DailyLog" "Budget" "PaymentApplications"; do
            FILE="src/pages/${page}.tsx"
            if [ -f "$FILE" ]; then
              COUNT=$(grep -c "Math\.random\|mockData\|MOCK_\|faker\." "$FILE" 2>/dev/null || echo "0")
              if [ "$COUNT" -gt "0" ]; then
                MOCKS=$((MOCKS + COUNT))
                echo "::warning::Mock data in $FILE: $COUNT instances"
              fi
            fi
          done
          echo "demo_mocks=$MOCKS" >> $GITHUB_OUTPUT

      - name: Check quality metrics
        id: quality
        run: |
          FLOOR_MOCKS=$(jq '.mockCount // 9999' .quality-floor.json 2>/dev/null || echo "9999")
          FLOOR_ANY=$(jq '.anyCount // 9999' .quality-floor.json 2>/dev/null || echo "9999")
          FLOOR_LINT=$(jq '.eslintErrors // 9999' .quality-floor.json 2>/dev/null || echo "9999")
          FLOOR_COVERAGE=$(jq '.testCoverage.lines // 0' .quality-floor.json 2>/dev/null || echo "0")
          echo "mocks=$FLOOR_MOCKS" >> $GITHUB_OUTPUT
          echo "any=$FLOOR_ANY" >> $GITHUB_OUTPUT
          echo "lint=$FLOOR_LINT" >> $GITHUB_OUTPUT
          echo "coverage=$FLOOR_COVERAGE" >> $GITHUB_OUTPUT

      - name: Count recent organism commits
        id: commits
        run: |
          ORGANISM_COMMITS=$(git log --since="3 days ago" --oneline --grep="\[auto\]" | wc -l | tr -d ' ')
          echo "commits=$ORGANISM_COMMITS" >> $GITHUB_OUTPUT
          echo "Recent organism commits (3 days): $ORGANISM_COMMITS"
          git log --since="3 days ago" --oneline --grep="\[auto\]" | head -10

      - name: Post progress issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date '+%B %d, %Y')
          DAYS_LEFT=$(python3 -c "
          from datetime import date
          target = date(2026, 4, 15)
          today = date.today()
          print((target - today).days)
          ")

          # Determine readiness level
          CHECKED="${{ steps.spec.outputs.checked }}"
          DEMO_MOCKS="${{ steps.demo.outputs.demo_mocks }}"
          COMMITS="${{ steps.commits.outputs.commits }}"

          if [ "$DEMO_MOCKS" -eq "0" ] && [ "$CHECKED" -gt "50" ]; then
            READINESS="🟢 ON TRACK — Demo pages clean, significant progress"
          elif [ "$DEMO_MOCKS" -lt "5" ] && [ "$COMMITS" -gt "5" ]; then
            READINESS="🟡 PROGRESSING — Minor cleanup needed on demo pages"
          else
            READINESS="🔴 NEEDS ATTENTION — Demo pages still have mock data"
          fi

          gh issue create \
            --title "[$DATE] Progress Report — $DAYS_LEFT days until April 15th" \
            --body "## Organism Progress Report

          **Date:** $DATE
          **Days until Walker returns:** $DAYS_LEFT
          **Readiness:** $READINESS

          ---

          ### SPEC.md Progress
          - Checked: ${{ steps.spec.outputs.checked }} / ${{ steps.spec.outputs.total }} criteria (${{ steps.spec.outputs.pct }}%)

          ### Demo Page Readiness
          - Mock data remaining on demo pages: **${{ steps.demo.outputs.demo_mocks }} instances**
          - Target: 0 by April 14th

          ### Quality Metrics (from .quality-floor.json)
          | Metric | Current | Target |
          |--------|---------|--------|
          | Mock data instances | ${{ steps.quality.outputs.mocks }} | 0 |
          | Unsafe casts (as any) | ${{ steps.quality.outputs.any }} | 0 |
          | ESLint errors | ${{ steps.quality.outputs.lint }} | 0 |
          | Test coverage | ${{ steps.quality.outputs.coverage }}% | 70% |

          ### Organism Activity
          - Commits in last 3 days: **${{ steps.commits.outputs.commits }}**

          ---

          ### For the Organism
          If demo_mocks > 0: focus exclusively on mock data elimination for the 6 demo pages before anything else.
          If demo_mocks = 0: proceed with FEEDBACK.md Phase 2 priorities.

          *This report auto-closes in 7 days.*" \
            --label "progress-report" 2>/dev/null || true
