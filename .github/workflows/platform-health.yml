name: Platform Health

on:
  schedule:
    # Every day at 09:00 UTC
    - cron: "0 9 * * *"
  workflow_dispatch:
  pull_request:
    paths:
      - 'supabase/functions/**'
      - 'supabase/migrations/**'

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      # Switched from bun to npm/tsx 2026-05-13 (BRT Phase 0): bun's
      # --frozen-lockfile failed against the repo's npm-managed
      # package-lock.json. Project tooling is npm-native; tsx runs the
      # TypeScript audit scripts directly.
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - run: npm ci

      - name: Audit edge functions
        run: npx tsx scripts/audit-edge-functions.ts
        continue-on-error: true

      - name: Audit migrations
        run: npx tsx scripts/audit-migrations.ts
        continue-on-error: true

      - name: Audit cron
        run: npx tsx scripts/audit-cron.ts
        continue-on-error: true

      - name: Upload audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: platform-health-audit
          path: |
            audit/edge-function-status.md
            audit/migration-status.md
            audit/cron-status.md
            audit/secrets-checklist.md
            audit/platform-health-baseline.json
          retention-days: 30

      - name: Open issue on drift
        if: failure() && github.event_name == 'schedule'
        run: |
          echo "Platform drift detected — see uploaded audit reports."
          echo "TODO: gh issue create with the markdown bodies."
