name: Multi-Agent Code Verification

on:
  workflow_run:
    workflows: ["Nightly Organism — Experiment Runner"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      hours_lookback:
        description: "Hours of commits to review (default: 6)"
        required: false
        default: "6"

# Only run verification when the organism completed successfully.
# On manual dispatch, always run.
jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Guard: skip if triggered by a failed workflow_run
  # ─────────────────────────────────────────────────────────────────────────
  check-trigger:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
    steps:
      - name: Evaluate trigger condition
        id: gate
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.workflow_run.conclusion }}" == "success" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Organism run did not succeed (conclusion: ${{ github.event.workflow_run.conclusion }}). Skipping verification."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # Phase 1: Four specialized Claude Sonnet 4.6 agents in parallel
  # ─────────────────────────────────────────────────────────────────────────
  review:
    needs: check-trigger
    if: needs.check-trigger.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # All agents must complete even if one fails
      matrix:
        agent:
          - name: correctness-agent
            dimension: correctness
            weight: 0.4
          - name: security-agent
            dimension: security
            weight: 0.3
          - name: performance-agent
            dimension: performance
            weight: 0.2
          - name: style-agent
            dimension: style
            weight: 0.1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # Full history needed for git log

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic

      - name: Collect organism diff
        id: diff
        run: |
          HOURS="${{ inputs.hours_lookback || '6' }}"
          DIFF=$(git log --since="${HOURS} hours ago" --author="SiteSync Organism" -p --no-merges)
          if [[ -z "$DIFF" ]]; then
            echo "No organism commits found in the last ${HOURS} hours."
            echo "diff_empty=true" >> "$GITHUB_OUTPUT"
          else
            echo "diff_empty=false" >> "$GITHUB_OUTPUT"
            # Write diff to a temp file to avoid shell-escaping issues
            printf '%s' "$DIFF" > /tmp/organism_diff.txt
            LINES=$(wc -l < /tmp/organism_diff.txt)
            echo "Captured diff: ${LINES} lines"
          fi

      - name: Skip if no diff
        if: steps.diff.outputs.diff_empty == 'true'
        run: |
          mkdir -p .reviews
          cat > .reviews/${{ matrix.agent.name }}.json << 'EOF'
          {
            "agent": "${{ matrix.agent.name }}",
            "dimension": "${{ matrix.agent.dimension }}",
            "weight": ${{ matrix.agent.weight }},
            "score": null,
            "skipped": true,
            "reason": "No organism commits found in review window",
            "critical_issues": [],
            "evidence": []
          }
          EOF
          echo "No diff — writing null review and exiting."

      - name: Run ${{ matrix.agent.name }} review
        if: steps.diff.outputs.diff_empty != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AGENT_NAME: ${{ matrix.agent.name }}
          DIMENSION: ${{ matrix.agent.dimension }}
          WEIGHT: ${{ matrix.agent.weight }}
        run: |
          mkdir -p .reviews
          python - << 'PYEOF'
          import anthropic
          import json
          import os
          import sys

          agent_name = os.environ["AGENT_NAME"]
          dimension  = os.environ["DIMENSION"]
          weight     = float(os.environ["WEIGHT"])

          # ── Load diff ──────────────────────────────────────────────────────
          with open("/tmp/organism_diff.txt", "r", errors="replace") as f:
              diff_text = f.read()

          # Truncate very large diffs (Claude Sonnet 4.6 context is large but
          # we keep focus sharp — first 40k chars captures most sessions)
          MAX_DIFF_CHARS = 40_000
          if len(diff_text) > MAX_DIFF_CHARS:
              diff_text = diff_text[:MAX_DIFF_CHARS] + "\n\n[... diff truncated for brevity ...]"

          # ── Dimension-specific judge prompts ───────────────────────────────
          PROMPTS = {

              "correctness": """You are a senior software engineer performing a correctness audit of code
          written by an autonomous AI agent for SiteSync — a construction management SaaS.
          The codebase uses: React 19, TypeScript, Supabase (PostgreSQL + RLS), and a
          custom V7 design system.

          TASK: Review the git diff below and evaluate CORRECTNESS ONLY.

          Evaluation criteria (cite specific line numbers for every finding):

          1. Logic errors — incorrect conditional branches, off-by-one errors, wrong
             operators, flipped boolean logic.
          2. Edge cases — null/undefined inputs, empty arrays, zero division, very large
             numbers, concurrent mutation of shared state.
          3. Exception handling — unhandled promise rejections, missing try/catch around
             Supabase queries, no error boundaries around React subtrees, swallowed errors.
          4. Type safety — TypeScript `any` casts that circumvent type checking, missing
             null checks after Supabase `.data` destructuring, incorrect generic bounds.
          5. Data integrity — mutations that bypass Supabase RLS policies, optimistic
             updates that are never rolled back on failure, stale closure captures in
             useEffect that read outdated state.
          6. React 19 correctness — misuse of new hooks (useOptimistic, use()), Server
             Component / Client Component boundary violations, hydration mismatches.

          Scoring guide (0–10):
            10 — No correctness issues found
             8 — Minor edge case gaps, no data corruption risk
             6 — Moderate issues; could cause incorrect behaviour in production
             4 — Serious logic errors; incorrect output in common scenarios
             2 — Critical bugs; likely data corruption or system failure
             0 — Code is fundamentally broken

          Output ONLY valid JSON matching this exact schema (no markdown fences):
          {
            "agent": "correctness-agent",
            "dimension": "correctness",
            "weight": 0.4,
            "score": <integer 0-10>,
            "deploy_recommendation": "<yes|conditional|no>",
            "critical_issues": [
              {
                "severity": "<critical|high|medium|low>",
                "file": "<filename>",
                "line": <line_number_or_null>,
                "description": "<what is wrong>",
                "suggested_fix": "<concrete fix>"
              }
            ],
            "evidence": [
              "<specific observation with line reference>"
            ],
            "summary": "<2-3 sentence overall assessment>"
          }

          Git diff to review:
          """,

              "security": """You are a security engineer performing a security audit of code written by an
          autonomous AI agent for SiteSync — a construction management SaaS.
          The stack: React 19, TypeScript, Supabase (PostgreSQL with Row Level Security),
          Next.js App Router, V7 design system. Users include general contractors,
          subcontractors, and project owners — data isolation between tenants is critical.

          TASK: Review the git diff below and evaluate SECURITY ONLY.

          Evaluation criteria (cite specific file paths and line numbers for every finding):

          1. OWASP Top 10 patterns — injection (SQL, command, LDAP), broken auth,
             sensitive data exposure, XXE, broken access control, security misconfiguration,
             XSS, insecure deserialization, using components with known vulnerabilities,
             insufficient logging.
          2. Hardcoded secrets — API keys, JWT secrets, Supabase service-role keys,
             Stripe keys, or any credential embedded in source code or committed config.
          3. SQL / PostgREST injection — raw string interpolation into Supabase `.rpc()`
             or `.filter()` calls; unparameterised queries.
          4. XSS vectors — `dangerouslySetInnerHTML` without sanitisation, user-controlled
             `href`/`src` values, unsanitised template literals in DOM APIs.
          5. Supabase RLS policy gaps — any INSERT, UPDATE, or DELETE that lacks a
             corresponding RLS policy; using the service-role key client-side; disabling
             RLS without justification; queries that could return rows belonging to a
             different tenant.
          6. Authentication & authorisation — missing `auth.uid()` checks in RLS,
             insecure direct object references (IDOR), privilege escalation vectors,
             missing role checks on admin endpoints.
          7. Dependency risks — newly added packages with known CVEs or extremely low
             download counts (supply chain risk).

          Scoring guide (0–10):
            10 — No security issues found
             8 — Low-severity findings only; no data leakage risk
             6 — Moderate issues; potential for limited data exposure
             4 — Serious vulnerability; cross-tenant data leak possible
             2 — Critical vulnerability; immediate exploitation risk
             0 — Actively introduces a backdoor or exposes all tenant data

          Output ONLY valid JSON matching this exact schema (no markdown fences):
          {
            "agent": "security-agent",
            "dimension": "security",
            "weight": 0.3,
            "score": <integer 0-10>,
            "deploy_recommendation": "<yes|conditional|no>",
            "critical_issues": [
              {
                "severity": "<critical|high|medium|low>",
                "file": "<filename>",
                "line": <line_number_or_null>,
                "description": "<what is wrong>",
                "suggested_fix": "<concrete fix>",
                "owasp_category": "<e.g. A01:2021 – Broken Access Control>"
              }
            ],
            "evidence": [
              "<specific observation with line reference>"
            ],
            "summary": "<2-3 sentence overall assessment>"
          }

          Git diff to review:
          """,

              "performance": """You are a performance engineer auditing code written by an autonomous AI agent
          for SiteSync — a construction management SaaS used on job sites, often on
          mobile devices with intermittent connectivity.
          Stack: React 19, TypeScript, Supabase, Next.js App Router, V7 design system.
          Mobile-first: assume 4G or worse; bundle size and render performance are critical.

          TASK: Review the git diff below and evaluate PERFORMANCE ONLY.

          Evaluation criteria (cite specific file paths and line numbers for every finding):

          1. Algorithmic complexity — O(n²) or worse loops, nested `.find()`/`.filter()`
             over large arrays, repeated traversal of the same data structure when a Map
             or Set would suffice.
          2. Unnecessary re-renders — components missing `React.memo`, unstable object/
             array literals in JSX props, inline arrow functions passed to child components
             that break reference equality, missing `useMemo` / `useCallback` for expensive
             computations.
          3. Supabase query patterns — N+1 queries (fetching one row then looping to
             fetch related rows), missing `select()` column projection (fetching `*` when
             only 2 columns are needed), no pagination on large result sets, missing
             `.abortSignal()` on queries tied to component lifecycle.
          4. Bundle size impact — large new dependencies, importing entire libraries
             instead of specific modules (e.g., `import _ from 'lodash'` vs named import),
             Server Components incorrectly marked as Client Components (moves code to
             browser bundle).
          5. Memory leaks — event listeners / subscriptions added in useEffect without
             cleanup return, Supabase Realtime channels not unsubscribed on unmount,
             setInterval without clearInterval.
          6. Image & asset handling — large unoptimised images, missing `next/image`
             usage, blocking fonts, missing `loading="lazy"` on below-the-fold images.
          7. Rendering strategy — pages that should be static (ISR) rendered dynamically,
             unnecessary `"use client"` directives that prevent server rendering.

          Scoring guide (0–10):
            10 — No performance issues found
             8 — Minor inefficiencies; negligible real-world impact
             6 — Noticeable slowdowns on mobile / slow connections
             4 — Significant performance regression; UX degradation in production
             2 — Severe regression; page unusable on typical job-site device
             0 — Introduces infinite loop or crashes the browser tab

          Output ONLY valid JSON matching this exact schema (no markdown fences):
          {
            "agent": "performance-agent",
            "dimension": "performance",
            "weight": 0.2,
            "score": <integer 0-10>,
            "deploy_recommendation": "<yes|conditional|no>",
            "critical_issues": [
              {
                "severity": "<critical|high|medium|low>",
                "file": "<filename>",
                "line": <line_number_or_null>,
                "description": "<what is wrong>",
                "suggested_fix": "<concrete fix>",
                "estimated_impact": "<e.g. +200ms LCP on 4G>"
              }
            ],
            "evidence": [
              "<specific observation with line reference>"
            ],
            "summary": "<2-3 sentence overall assessment>"
          }

          Git diff to review:
          """,

              "style": """You are a senior frontend engineer and design-system maintainer auditing code
          written by an autonomous AI agent for SiteSync — a construction management SaaS.
          Stack: React 19, TypeScript, Supabase, Next.js App Router, V7 design system.
          SiteSync's V7 design system enforces strict naming conventions, component APIs,
          token usage, and accessibility requirements for construction job-site use.

          TASK: Review the git diff below and evaluate STYLE & DESIGN COMPLIANCE ONLY.

          Evaluation criteria (cite specific file paths and line numbers for every finding):

          1. Naming conventions — PascalCase React components, camelCase props/variables,
             kebab-case CSS classes/files, SCREAMING_SNAKE_CASE constants. Any deviation
             is a finding.
          2. V7 design system compliance — use of V7 design tokens (colours, spacing,
             typography scales) rather than hardcoded hex/px values; use of V7 components
             (Button, Card, Modal, Toast, etc.) instead of ad-hoc implementations; correct
             variant/size prop values.
          3. Touch targets — interactive elements (buttons, links, inputs, checkboxes)
             must meet the 56px minimum touch target size for field use. Any element below
             56px that is interactive on mobile is a violation.
          4. Accessibility — ARIA labels on icon-only buttons, meaningful alt text on
             images, correct heading hierarchy (no skipped levels), sufficient colour
             contrast (4.5:1 for normal text, 3:1 for large text), keyboard navigability,
             focus-visible ring on all interactive elements.
          5. Code organisation — single-responsibility components (< 200 lines), co-
             located styles/tests, no business logic in presentational components, no
             direct Supabase calls from UI components (must go through a service layer or
             custom hook).
          6. TypeScript style — explicit return types on exported functions, no `any`,
             interfaces for component props (not inline types), use of `satisfies` operator
             for config objects.
          7. Documentation — JSDoc on exported components and hooks, in-code comments for
             non-obvious logic, updated CHANGELOG or migration notes for breaking changes.

          Scoring guide (0–10):
            10 — Fully compliant with V7 and naming conventions
             8 — Minor deviations; no user-facing impact
             6 — Moderate style issues; some V7 token drift or accessibility gaps
             4 — Significant violations; touch targets below 56px or missing ARIA on
                 interactive elements
             2 — Major design system violations; product looks inconsistent or is
                 inaccessible to users relying on assistive technology
             0 — Complete disregard for conventions; effectively unmaintainable

          Output ONLY valid JSON matching this exact schema (no markdown fences):
          {
            "agent": "style-agent",
            "dimension": "style",
            "weight": 0.1,
            "score": <integer 0-10>,
            "deploy_recommendation": "<yes|conditional|no>",
            "critical_issues": [
              {
                "severity": "<critical|high|medium|low>",
                "file": "<filename>",
                "line": <line_number_or_null>,
                "description": "<what is wrong>",
                "suggested_fix": "<concrete fix>",
                "category": "<naming|v7-token|touch-target|accessibility|organisation|typescript|documentation>"
              }
            ],
            "evidence": [
              "<specific observation with line reference>"
            ],
            "summary": "<2-3 sentence overall assessment>"
          }

          Git diff to review:
          """,
          }

          prompt = PROMPTS[dimension] + "\n\n" + diff_text

          # ── Call Claude Sonnet 4.6 ─────────────────────────────────────────
          client = anthropic.Anthropic(api_key=os.environ["ANTHROPIC_API_KEY"])

          print(f"[{agent_name}] Sending diff ({len(diff_text):,} chars) to Claude Sonnet 4.6 …")

          message = client.messages.create(
              model="claude-sonnet-4-6",
              max_tokens=4096,
              messages=[{"role": "user", "content": prompt}],
          )

          raw_response = message.content[0].text.strip()
          print(f"[{agent_name}] Raw response ({len(raw_response)} chars):")
          print(raw_response[:500])

          # ── Parse JSON ────────────────────────────────────────────────────
          # Strip any accidental markdown code fences
          if raw_response.startswith("```"):
              lines = raw_response.split("\n")
              raw_response = "\n".join(lines[1:-1] if lines[-1].strip() == "```" else lines[1:])

          try:
              review = json.loads(raw_response)
          except json.JSONDecodeError as e:
              print(f"[{agent_name}] WARNING: Failed to parse JSON response: {e}")
              print("Storing raw response and marking parse error.")
              review = {
                  "agent": agent_name,
                  "dimension": dimension,
                  "weight": weight,
                  "score": None,
                  "parse_error": str(e),
                  "raw_response": raw_response,
                  "critical_issues": [],
                  "evidence": [],
                  "summary": "Parse error — see raw_response field.",
              }

          # Ensure required fields exist
          review.setdefault("agent", agent_name)
          review.setdefault("dimension", dimension)
          review.setdefault("weight", weight)

          output_path = f".reviews/{agent_name}.json"
          with open(output_path, "w") as f:
              json.dump(review, f, indent=2)

          score = review.get("score")
          print(f"[{agent_name}] Score: {score}/10 → written to {output_path}")

          # Signal critical issues to the workflow
          if isinstance(score, (int, float)) and score < 4:
              print(f"::warning title={agent_name} CRITICAL::{agent_name} scored {score}/10 — urgent review required")
          PYEOF

      - name: Upload review artifact
        uses: actions/upload-artifact@v4
        with:
          name: review-${{ matrix.agent.name }}
          path: .reviews/${{ matrix.agent.name }}.json
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────
  # Phase 2: Consensus — aggregate all 4 reviews
  # ─────────────────────────────────────────────────────────────────────────
  consensus:
    needs: review
    if: always() && needs.check-trigger.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download all review artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: review-*
          merge-multiple: true
          path: .reviews

      - name: List downloaded reviews
        run: ls -lh .reviews/

      - name: Run aggregate-reviews script
        run: python scripts/aggregate-reviews.py

      - name: Create URGENT issue if any dimension < 4.0
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let consensus;
            try {
              consensus = JSON.parse(fs.readFileSync('.reviews/consensus.json', 'utf8'));
            } catch (e) {
              core.warning('Could not read consensus.json: ' + e.message);
              return;
            }

            const urgent = consensus.urgent_dimensions || [];
            if (urgent.length === 0) return;

            const urgentDetails = urgent.map(d =>
              `- **${d.dimension}** — score ${d.score}/10 (threshold: 4.0)`
            ).join('\n');

            const issueBody = [
              '## 🚨 URGENT: Code Quality Alert — SiteSync Organism',
              '',
              `One or more quality dimensions scored **below 4.0** in the nightly verification run.`,
              '',
              '### Urgent Dimensions',
              urgentDetails,
              '',
              '### Consensus Summary',
              `**Aggregate score:** ${consensus.aggregate_score}/10`,
              `**Deploy recommendation:** ${consensus.deploy_recommendation}`,
              '',
              '### Issues Flagged by Multiple Agents',
              (consensus.consensus_issues || []).length > 0
                ? consensus.consensus_issues.map(i =>
                    `- \`${i.file || 'unknown'}\` line ${i.line || '?'}: ${i.description}`
                  ).join('\n')
                : '_None_',
              '',
              `> Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 URGENT: Organism code quality critical — ${urgent.map(d => d.dimension).join(', ')} below threshold`,
              body: issueBody,
              labels: ['organism-review', 'urgent', 'automated'],
            });

            core.warning('URGENT issue created for dimensions: ' + urgent.map(d => d.dimension).join(', '));

      - name: Create quality-flag issue if aggregate score < 6.0
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let consensus;
            try {
              consensus = JSON.parse(fs.readFileSync('.reviews/consensus.json', 'utf8'));
            } catch (e) {
              core.warning('Could not read consensus.json: ' + e.message);
              return;
            }

            // Skip if urgent issues already created (avoid double-filing)
            const urgent = consensus.urgent_dimensions || [];
            if (urgent.length > 0) {
              core.info('Urgent issue already created — skipping low-score issue.');
              return;
            }

            const agg = consensus.aggregate_score;
            if (agg === null || agg >= 6.0) {
              core.info(`Aggregate score ${agg} is acceptable — no issue needed.`);
              return;
            }

            const scoreTable = (consensus.dimension_scores || [])
              .map(d => `| ${d.dimension} | ${d.score ?? 'N/A'} | ${d.weight} |`)
              .join('\n');

            const issueBody = [
              '## ⚠️ Code Quality Flag — SiteSync Organism Nightly Run',
              '',
              `The nightly organism run produced commits with an **aggregate quality score of ${agg}/10**, below the 6.0 threshold.`,
              '',
              '### Dimension Scores',
              '| Dimension | Score | Weight |',
              '|-----------|-------|--------|',
              scoreTable,
              '',
              '### Deploy Recommendation',
              `**${consensus.deploy_recommendation}**`,
              '',
              '### Issues Flagged by Multiple Agents (Consensus Issues)',
              (consensus.consensus_issues || []).length > 0
                ? consensus.consensus_issues.map(i =>
                    `- \`${i.file || 'unknown'}\` line ${i.line || '?'}: ${i.description} _(flagged by ${i.flagged_by.join(', ')})_`
                  ).join('\n')
                : '_No cross-agent consensus issues found._',
              '',
              '### Per-Agent Summaries',
              (consensus.agent_summaries || []).map(a =>
                `**${a.agent}:** ${a.summary || 'No summary available.'}`
              ).join('\n\n'),
              '',
              `> Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Organism quality below threshold — aggregate score ${agg}/10`,
              body: issueBody,
              labels: ['organism-review', 'quality-flag', 'automated'],
            });

            core.warning(`Quality-flag issue created. Aggregate score: ${agg}/10`);

      - name: Commit review results
        run: |
          git config user.name  "SiteSync Verifier"
          git config user.email "verifier@sitesync-pm.bot"

          git add .reviews/
          # Only commit if there is something staged
          if git diff --cached --quiet; then
            echo "No review files changed — nothing to commit."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            git commit -m "chore: verification review ${TIMESTAMP} [skip ci]"
            git push
          fi
