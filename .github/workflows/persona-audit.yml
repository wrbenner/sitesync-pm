name: Persona Audit (Tab C)

on:
  schedule:
    # Nightly at 06:00 UTC
    - cron: '0 6 * * *'
  pull_request:
    types: [opened, labeled, synchronize]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  persona-audit:
    if: >-
      github.event_name == 'schedule'
      || github.event_name == 'workflow_dispatch'
      || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'persona-audit'))
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      # Tests skip seed/cron-dependent steps when these are unset; that's
      # by design (logged as seed_unavailable / cron_unavailable, not a
      # job failure).
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run persona-audit specs
        # The job fails only on regressions. test.skip(...) rows for
        # documented expected_unwired blockers exit 0 in Playwright.
        run: npx playwright test e2e/personas/ --reporter=line

      - name: Upload audit findings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: persona-audit-findings
          path: |
            audit/persona-blockers.md
            audit/persona-perf.md
            audit/onboarding-friction.md
          retention-days: 30

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
