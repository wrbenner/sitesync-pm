name: "Organism — Cycle"
on:
  schedule:
    - cron: "0 */2 * * *" # Every 2 hours
  workflow_dispatch:
    inputs:
      max_turns:
        description: 'Max Claude Code turns'
        default: '50'
      focus:
        description: 'Focus area (auto, quality, pages, services, tests, performance)'
        default: 'auto'

permissions:
  contents: write
  pull-requests: write
  actions: write

env:
  NODE_VERSION: "22"
  OWNER: "wrbenner"
  REPO: "sitesync-pm"

jobs:
  perceive-and-reason:
    name: "Perceive & Reason"
    runs-on: ubuntu-latest
    outputs:
      experiment: ${{ steps.reason.outputs.experiment }}
      branch: ${{ steps.reason.outputs.branch }}
      title: ${{ steps.reason.outputs.title }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install and measure
        run: |
          npm ci --silent 2>/dev/null
          echo "ESLINT_ERRORS=$(npx eslint src/ --format json 2>/dev/null | python3 -c "import json,sys; d=json.load(sys.stdin); print(sum(r['errorCount'] for r in d))" 2>/dev/null || echo 0)" >> "$GITHUB_ENV"
          echo "FLOOR=$(jq '.eslintErrors' .quality-floor.json)" >> "$GITHUB_ENV"

      - name: Decide what to build
        id: reason
        run: |
          FOCUS="${{ github.event.inputs.focus || 'auto' }}"

          # Check what exists
          check_file() { test -f "$1" && echo "yes" || echo "no"; }

          # Service layers
          HAS_SUBMITTAL_SVC=$(check_file src/services/submittalService.ts)
          HAS_DAILYLOG_SVC=$(check_file src/services/dailyLogService.ts)
          HAS_CO_SVC=$(check_file src/services/changeOrderService.ts)
          HAS_PUNCH_SVC=$(check_file src/services/punchItemService.ts)

          if [ "$FOCUS" = "auto" ]; then
            # Priority 1: Missing service layers (kernel conformance)
            if [ "$HAS_SUBMITTAL_SVC" = "no" ]; then
              EXP="Create src/services/submittalService.ts — a kernel-native service layer for submittals following the exact pattern of src/services/rfiService.ts. It must: load submittals with soft-delete filter, create with provenance, enforce lifecycle transitions via the submittal state machine, implement soft-delete, and populate updated_by. Then rewire src/stores/submittalStore.ts to delegate to the service. Update any call sites in src/pages/Submittals.tsx."
              BRANCH="organism/submittal-service-$(date +%H%M)"
              TITLE="Kernel service layer for submittals"

            elif [ "$HAS_CO_SVC" = "no" ]; then
              EXP="Create src/services/changeOrderService.ts — kernel-native service layer for change orders following rfiService.ts pattern. Lifecycle enforcement, provenance, soft-delete. Rewire changeOrderStore.ts."
              BRANCH="organism/change-order-service-$(date +%H%M)"
              TITLE="Kernel service layer for change orders"

            elif [ "$HAS_PUNCH_SVC" = "no" ]; then
              EXP="Create src/services/punchItemService.ts — kernel-native service layer for punch items following rfiService.ts pattern. Lifecycle enforcement, provenance, soft-delete. Rewire punchListStore.ts."
              BRANCH="organism/punch-item-service-$(date +%H%M)"
              TITLE="Kernel service layer for punch items"

            # Priority 2: ESLint error reduction
            elif [ "$ESLINT_ERRORS" -gt "1000" ]; then
              EXP="Reduce ESLint errors. Current count: $ESLINT_ERRORS (floor: $FLOOR). Go through src/ and fix the most impactful errors: unused variables, missing types, unreachable code, any-type assertions. Target: reduce by at least 15. Do NOT add eslint-disable comments — actually fix the code."
              BRANCH="organism/eslint-fixes-$(date +%H%M)"
              TITLE="Quality: fix $((ESLINT_ERRORS > 15 ? 15 : ESLINT_ERRORS)) ESLint errors"

            # Priority 3: Page polish
            else
              EXP="Pick ONE page from src/pages/ that has hardcoded data, missing error handling, or poor mobile layout. Read .organism/DIRECTIVES.md for the quality standard. Make that page enterprise-grade: proper loading/error/empty states, real data from stores, mobile-responsive, 48px touch targets, framer-motion animations."
              BRANCH="organism/page-polish-$(date +%H%M)"
              TITLE="Enterprise polish: page improvement"
            fi
          else
            case "$FOCUS" in
              quality) EXP="Fix ESLint errors. Current: $ESLINT_ERRORS. Reduce by 15+."; BRANCH="organism/eslint-$(date +%H%M)"; TITLE="ESLint fixes" ;;
              pages) EXP="Polish one page to enterprise quality."; BRANCH="organism/pages-$(date +%H%M)"; TITLE="Page polish" ;;
              services) EXP="Create the next missing kernel service layer."; BRANCH="organism/services-$(date +%H%M)"; TITLE="Service layer" ;;
              tests) EXP="Add tests for existing service layers."; BRANCH="organism/tests-$(date +%H%M)"; TITLE="Test coverage" ;;
              performance) EXP="Reduce bundle size and improve load times."; BRANCH="organism/perf-$(date +%H%M)"; TITLE="Performance" ;;
              *) EXP="Auto-select highest leverage."; BRANCH="organism/auto-$(date +%H%M)"; TITLE="Auto improvement" ;;
            esac
          fi

          echo "experiment=$EXP" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "::notice::Experiment: $TITLE"

  build:
    name: "Build with Claude Code"
    needs: perceive-and-reason
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Create branch
        run: |
          git config user.name "organism[bot]"
          git config user.email "organism[bot]@users.noreply.github.com"
          git checkout -b "${{ needs.perceive-and-reason.outputs.branch }}"

      - name: Build
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: |
          MAX_TURNS="${{ github.event.inputs.max_turns || '50' }}"

          claude -p "${{ needs.perceive-and-reason.outputs.experiment }}

YOU ARE THE SITESYNC ORGANISM. Read .organism/DIRECTIVES.md FIRST.

You have 4 AI providers: Claude (you), OpenAI, Gemini, Perplexity — all via env vars.
Use curl to call their APIs when you need capabilities beyond code generation.
See supabase/functions/shared/aiRouter.ts for API call patterns.

RULES:
- Read .organism/DIRECTIVES.md and .organism/vision/PRODUCT_VISION.md
- Inline styles with src/styles/theme.ts tokens only
- Mobile-first, 48px touch targets, framer-motion animations
- npx tsc --noEmit must pass
- ESLint errors must NOT increase
- npm run build must pass
- Make it BEAUTIFUL. Apple quality." \
            --max-turns "$MAX_TURNS" \
            --allowedTools "Edit,Write,Read,Bash(npm*),Bash(npx*),Bash(git*),Bash(cat*),Bash(grep*),Bash(find*),Bash(ls*),Bash(head*),Bash(tail*),Bash(wc*),Bash(curl*),Bash(python3*)" \
            --output-format json 2>&1 | tail -50

      - name: Verify
        run: |
          npm ci --silent 2>/dev/null
          npx tsc --noEmit
          npm run build
          NEW_ERRORS=$(npx eslint src/ --format json 2>/dev/null | python3 -c "import json,sys; d=json.load(sys.stdin); print(sum(r['errorCount'] for r in d))" 2>/dev/null || echo "9999")
          OLD_ERRORS=$(jq '.eslintErrors' .quality-floor.json)
          echo "ESLint: $NEW_ERRORS (floor: $OLD_ERRORS)"
          if [ "$NEW_ERRORS" -gt "$OLD_ERRORS" ]; then
            echo "::error::ESLint errors increased"
            exit 1
          fi
          # Ratchet down if improved
          if [ "$NEW_ERRORS" -lt "$OLD_ERRORS" ]; then
            jq ".eslintErrors = $NEW_ERRORS | ._updated = \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\" | ._updatedBy = \"organism\"" .quality-floor.json > .qf.tmp && mv .qf.tmp .quality-floor.json
            echo "::notice::Quality floor improved: $OLD_ERRORS -> $NEW_ERRORS"
          fi

      - name: Push and create PR
        if: success()
        run: |
          git add -A
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "[organism] ${{ needs.perceive-and-reason.outputs.title }}"
          git push -u origin "${{ needs.perceive-and-reason.outputs.branch }}"
          gh pr create --base main \
            --head "${{ needs.perceive-and-reason.outputs.branch }}" \
            --title "[organism] ${{ needs.perceive-and-reason.outputs.title }}" \
            --body "Autonomous build. All gates must pass for auto-merge."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  auto-merge:
    name: "Auto-merge if CI passes"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI gates
        run: sleep 180 # Wait 3 minutes for CI to start and run

      - name: Find and merge organism PR
        run: |
          PR_NUMBER=$(gh pr list --repo ${{ env.OWNER }}/${{ env.REPO }} \
            --head "${{ needs.perceive-and-reason.outputs.branch }}" \
            --json number --jq '.[0].number')
          
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR found"
            exit 0
          fi

          echo "Checking PR #$PR_NUMBER"

          # Wait up to 10 minutes for CI
          for i in $(seq 1 20); do
            PASS=$(gh pr checks "$PR_NUMBER" --repo ${{ env.OWNER }}/${{ env.REPO }} 2>&1 | grep -c 'pass' || echo "0")
            FAIL=$(gh pr checks "$PR_NUMBER" --repo ${{ env.OWNER }}/${{ env.REPO }} 2>&1 | grep -c 'fail' || echo "0")
            PENDING=$(gh pr checks "$PR_NUMBER" --repo ${{ env.OWNER }}/${{ env.REPO }} 2>&1 | grep -c 'pending' || echo "0")
            
            echo "Attempt $i: $PASS pass, $FAIL fail, $PENDING pending"
            
            if [ "$FAIL" -gt "0" ]; then
              echo "::error::CI failed. PR #$PR_NUMBER will not be merged."
              exit 1
            fi
            
            if [ "$PENDING" -eq "0" ] && [ "$PASS" -gt "0" ]; then
              echo "All gates passed. Merging PR #$PR_NUMBER"
              gh pr merge "$PR_NUMBER" --repo ${{ env.OWNER }}/${{ env.REPO }} \
                --merge --subject "[organism] ${{ needs.perceive-and-reason.outputs.title }} (#$PR_NUMBER)" \
                --admin
              echo "::notice::PR #$PR_NUMBER merged automatically"
              exit 0
            fi
            
            sleep 30
          done
          
          echo "::warning::Timed out waiting for CI"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
