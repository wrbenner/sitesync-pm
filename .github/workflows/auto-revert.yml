name: Auto-Revert Bad Organism Commits

on:
  workflow_run:
    workflows: ["Homeostasis — Quality Ratchet CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  issues: write

jobs:
  auto-revert:
    name: "Revert if organism broke main"
    if: |
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 5
          ref: main

      - name: Check if failing commit is from organism
        id: check
        run: |
          LAST_MSG=$(git log -1 --format='%s')
          echo "Last commit: $LAST_MSG"
          if echo "$LAST_MSG" | grep -q "\[auto\]\|\[auto-alpha\]\|\[auto-beta\]\|\[auto-gamma\]\|\[auto-delta\]\|\[auto-echo\]\|\[sprint-zero\]"; then
            echo "is_organism=true" >> $GITHUB_OUTPUT
            echo "Organism commit detected — will auto-revert"
          else
            echo "is_organism=false" >> $GITHUB_OUTPUT
            echo "Not an organism commit — skipping auto-revert"
          fi

      - name: Revert the bad commit
        if: steps.check.outputs.is_organism == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "SiteSync Auto-Revert"
          git config user.email "revert@sitesync.ai"
          
          BAD_SHA=$(git log -1 --format='%H')
          BAD_MSG=$(git log -1 --format='%s')
          
          git revert --no-edit "$BAD_SHA"
          git commit --amend -m "revert: auto-revert bad organism commit [skip ci]

          Reverted: $BAD_MSG ($BAD_SHA)
          Reason: CI failed on main after this commit.
          The organism will retry on the next scheduled run."
          
          git push origin main
          
          # Create an issue so the organism knows about the failure
          gh issue create \
            --title "[auto-revert] Reverted organism commit $(echo $BAD_SHA | cut -c1-7)" \
            --body "## CI Failed — Organism Commit Auto-Reverted

          **Reverted commit:** $BAD_SHA
          **Message:** $BAD_MSG

          The organism pushed code that broke CI. It has been automatically reverted.

          **What the organism should do on the next run:**
          1. Read this issue
          2. Look at what failed in CI: [workflow run](https://github.com/wrbenner/sitesync-pm/actions/runs/${{ github.event.workflow_run.id }})
          3. Fix the root cause
          4. Recommit with passing gates

          The CI failure was likely caused by a TypeScript error, build error, or test failure that passed local gates but failed on Linux. Check for platform-specific issues." \
            --label "bug" \
            --label "auto-revert" 2>/dev/null || true
