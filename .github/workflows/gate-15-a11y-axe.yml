# Gate 15 - a11y Axe Scan (B.11)
#
# Runs Playwright tests/a11y/*.spec.ts which load each top-level route
# in chromium and run @axe-core/playwright against the page. Asserts no
# violations of WCAG 2.1 AA serious/critical level.
#
# Informational mode until secrets wired.
#
# Required secrets:
#   PREVIEW_BASE_URL
#   STAGING_SUPABASE_URL
#   STAGING_SUPABASE_ANON_KEY
#   STAGING_POLISH_USER
#   STAGING_POLISH_PASS
#
# SECURITY: only secrets.* via env: blocks. No github.event.* in run:.

name: Gate 15 - a11y Axe Scan

on:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/a11y/**'
  push:
    branches: [main]

jobs:
  a11y-axe:
    name: Playwright axe-core a11y scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright a11y specs
        env:
          E2E_REAL_BACKEND: 'true'
          E2E_BASE_URL: ${{ secrets.PREVIEW_BASE_URL }}
          SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          POLISH_USER: ${{ secrets.STAGING_POLISH_USER }}
          POLISH_PASS: ${{ secrets.STAGING_POLISH_PASS }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${E2E_BASE_URL:-}" ]; then
            echo "::warning::Required secrets not set; gate skipped (informational mode)."
            exit 0
          fi
          npx playwright test tests/a11y/ --project=chromium --reporter=list

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-a11y-report
          path: playwright-report/
          retention-days: 7
