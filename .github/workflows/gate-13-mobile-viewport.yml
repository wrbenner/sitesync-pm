# Gate 13 - Mobile Viewport (B.13)
#
# Runs Playwright tests/mobile/*.spec.ts against the configured preview
# deployment + staging Supabase under mobile device emulation. Catches
# regressions on tap targets, viewport overflow, and gesture handling.
#
# Informational mode until secrets wired.
#
# Required secrets:
#   PREVIEW_BASE_URL
#   STAGING_SUPABASE_URL
#   STAGING_SUPABASE_ANON_KEY
#   STAGING_POLISH_USER
#   STAGING_POLISH_PASS
#
# SECURITY: only secrets.* via env: blocks. No github.event.* in run:.

name: Gate 13 - Mobile Viewport

on:
  pull_request:
    paths:
      - 'src/**'
      - 'e2e/**'
      - 'tests/mobile/**'
      - '.github/workflows/gate-13-mobile-viewport.yml'
  push:
    branches: [main]

jobs:
  mobile-viewport:
    name: Playwright mobile viewport specs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright mobile specs
        env:
          E2E_REAL_BACKEND: 'true'
          E2E_BASE_URL: ${{ secrets.PREVIEW_BASE_URL }}
          SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          POLISH_USER: ${{ secrets.STAGING_POLISH_USER }}
          POLISH_PASS: ${{ secrets.STAGING_POLISH_PASS }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${E2E_BASE_URL:-}" ]; then
            echo "::warning::Required secrets not set; gate skipped (informational mode)."
            exit 0
          fi
          npx playwright test tests/mobile/ --project=chromium --reporter=list

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-mobile-report
          path: playwright-report/
          retention-days: 7
