name: Eval Harness

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: evals-${{ github.ref }}
  cancel-in-progress: true

jobs:
  layer1-database:
    name: "Eval Layer 1: Database/RLS"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install psql
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Generate eval config
        run: |
          printf '{"supabase":{"url":"$SUPABASE_URL","anon_key":"$SUPABASE_ANON_KEY","service_role_key":"$SUPABASE_SERVICE_ROLE_KEY","db_url":"$SUPABASE_DB_URL"}}' > evals/config.json

      - name: Run Layer 1
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          # Ensure SSL mode is set for Supabase direct connections
          if [[ "$SUPABASE_DB_URL" != *sslmode* ]]; then
            if [[ "$SUPABASE_DB_URL" == *\?* ]]; then
              export SUPABASE_DB_URL="${SUPABASE_DB_URL}&sslmode=require"
            else
              export SUPABASE_DB_URL="${SUPABASE_DB_URL}?sslmode=require"
            fi
          fi
          # Debug: show connection details (password masked)
          echo "DB host: $(echo "$SUPABASE_DB_URL" | sed 's|://[^@]*@|://***@|')"
          echo "SSL mode appended: $(echo "$SUPABASE_DB_URL" | grep -c sslmode) (1=yes)"
          # Test connection with verbose error output
          echo "Testing database connectivity..."
          psql "$SUPABASE_DB_URL" -c "SELECT 'CONNECTED' as status, current_database(), version()" 2>&1 || {
            echo "::error::psql connection failed. URL format: $(echo "$SUPABASE_DB_URL" | sed 's|://[^@]*@|://***@|')"
            exit 1
          }
          echo "Database connection successful"
          chmod +x evals/run-evals.sh
          evals/run-evals.sh --layer 1

  layer2-api:
    name: "Eval Layer 2: API"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Generate eval config
        run: |
          printf '{"supabase":{"url":"$SUPABASE_URL","anon_key":"$SUPABASE_ANON_KEY","service_role_key":"$SUPABASE_SERVICE_ROLE_KEY","db_url":"$SUPABASE_DB_URL"}}' > evals/config.json

      - name: Run Layer 2
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          chmod +x evals/run-evals.sh
          evals/run-evals.sh --layer 2
