name: Eval Harness

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: evals-${{ github.ref }}
  cancel-in-progress: true

jobs:
  layer1-database:
    name: "Eval Layer 1: Database/RLS"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Layer 1 (REST API)
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          chmod +x evals/layer1-database/run-layer1-rest.sh
          evals/layer1-database/run-layer1-rest.sh

  layer2-api:
    name: "Eval Layer 2: API"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: npm ci

      - name: Generate eval config
        run: |
          printf '{"supabase":{"url":"$SUPABASE_URL","anon_key":"$SUPABASE_ANON_KEY","service_role_key":"$SUPABASE_SERVICE_ROLE_KEY","db_url":"$SUPABASE_DB_URL"}}' > evals/config.json

      - name: Run Layer 2
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          chmod +x evals/run-evals.sh
          evals/run-evals.sh --layer 2

  iris-eval:
    name: "Iris Eval: voice + citations + action shape"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Iris-relevant changes
        id: changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD || true)
          fi
          echo "Changed files:"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -qE '^(src/lib/iris/|src/services/iris/|supabase/functions/iris-call/|supabase/functions/shared/(voiceLinter|aiRouter|langfuse)|evals/iris/|scripts/(build|check)-iris)' ; then
            echo "iris_relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "iris_relevant=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.changes.outputs.iris_relevant == 'true'
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        if: steps.changes.outputs.iris_relevant == 'true'
        run: npm ci

      - name: Validate corpus is in sync with generator
        if: steps.changes.outputs.iris_relevant == 'true'
        run: |
          npx tsx scripts/build-iris-corpus.ts
          if ! git diff --quiet evals/iris/corpus/seed.jsonl ; then
            echo "::error::seed.jsonl is out of sync with scripts/build-iris-corpus.ts. Run 'npm run eval:iris:expand' and commit."
            git diff evals/iris/corpus/seed.jsonl
            exit 1
          fi

      - name: Typecheck Iris eval modules
        if: steps.changes.outputs.iris_relevant == 'true'
        run: npm run typecheck

      - name: Run live Iris eval
        id: live_eval
        if: steps.changes.outputs.iris_relevant == 'true' && env.STAGING_SUPABASE_URL != ''
        env:
          STAGING_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          STAGING_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
        run: npm run eval:iris

      - name: Check eval gate
        if: steps.changes.outputs.iris_relevant == 'true' && env.STAGING_SUPABASE_URL != ''
        env:
          STAGING_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
        run: npx tsx scripts/check-iris-eval.ts

      - name: Skip notice (no staging configured)
        if: steps.changes.outputs.iris_relevant == 'true' && env.STAGING_SUPABASE_URL == ''
        env:
          STAGING_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
        run: |
          echo "::warning::STAGING_SUPABASE_URL secret not set — running corpus + typecheck only. Configure secrets to enable the live regression gate."

      - name: Upload eval results artifact
        if: steps.changes.outputs.iris_relevant == 'true' && env.STAGING_SUPABASE_URL != ''
        env:
          STAGING_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
        uses: actions/upload-artifact@v4
        with:
          name: iris-eval-results
          path: evals/iris/results/*.json
          retention-days: 30
