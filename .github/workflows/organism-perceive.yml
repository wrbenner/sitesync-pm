name: "Organism — Perceive"

on:
  schedule:
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

env:
  NODE_VERSION: "22"

jobs:
  perceive:
    name: Perceive environment state
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          npm ci
          sudo apt-get update && sudo apt-get install -y jq

      - name: Run metric collectors
        run: |
          mkdir -p .metrics
          python3 scripts/cells/count-eslint-issues.py || true
          python3 scripts/cells/count-type-issues.py || true
          python3 scripts/cells/count-quality-issues.py || true
          python3 scripts/cells/find-untested.py || true

      - name: Gather perception metrics
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          DATE_SLUG=$(date -u +%Y%m%d-%H%M)

          # ESLint metrics from collector output
          ESLINT_ERRORS=$(jq '.errorCount // 0' .metrics/eslint-issues.json 2>/dev/null || echo 0)
          ESLINT_WARNINGS=$(jq '.warningCount // 0' .metrics/eslint-issues.json 2>/dev/null || echo 0)

          # Type issue metrics
          TYPE_ERRORS=$(jq '.errorCount // 0' .metrics/type-issues.json 2>/dev/null || echo 0)

          # Quality metrics
          QUALITY_ISSUES=$(jq '.issueCount // 0' .metrics/quality-issues.json 2>/dev/null || echo 0)

          # Untested files
          UNTESTED_COUNT=$(jq '.untestedCount // 0' .metrics/untested-files.json 2>/dev/null || echo 0)

          # Schema gap stats
          SCHEMA_TOTAL=0
          SCHEMA_CONFORMANT=0
          if [ -f SCHEMA_GAP_ANALYSIS.md ]; then
            SCHEMA_TOTAL=$(grep -c '^\|' SCHEMA_GAP_ANALYSIS.md 2>/dev/null || echo 0)
            SCHEMA_CONFORMANT=$(grep -c 'Full\|Conformant\|✅' SCHEMA_GAP_ANALYSIS.md 2>/dev/null || echo 0)
          fi

          # Quality floor values
          FLOOR_ESLINT=$(jq '.eslintErrors // 0' .quality-floor.json 2>/dev/null || echo 0)
          FLOOR_COVERAGE=$(jq '.coveragePercent // 0' .quality-floor.json 2>/dev/null || echo 0)
          FLOOR_BUNDLE=$(jq '.bundleSizeKB // 0' .quality-floor.json 2>/dev/null || echo 0)

          # Open PRs from organism
          OPEN_ORGANISM_PRS=$(gh pr list --search "head:organism/" --json number --jq 'length' 2>/dev/null || echo 0)

          # Recent eval results
          EVAL_PASS_RATE=$(gh run list --workflow=evals.yml --limit=5 --json conclusion --jq '[.[] | select(.conclusion=="success")] | length' 2>/dev/null || echo 0)

          # Build perception JSON
          cat > ".metrics/perception-${DATE_SLUG}.json" << PERCEPTION_EOF
          {
            "timestamp": "${TIMESTAMP}",
            "eslint": {
              "errors": ${ESLINT_ERRORS},
              "warnings": ${ESLINT_WARNINGS},
              "floor": ${FLOOR_ESLINT}
            },
            "typescript": {
              "errors": ${TYPE_ERRORS}
            },
            "quality": {
              "issues": ${QUALITY_ISSUES},
              "untested_files": ${UNTESTED_COUNT}
            },
            "schema": {
              "total_tables": ${SCHEMA_TOTAL},
              "conformant": ${SCHEMA_CONFORMANT}
            },
            "coverage": {
              "floor_percent": ${FLOOR_COVERAGE}
            },
            "bundle": {
              "floor_kb": ${FLOOR_BUNDLE}
            },
            "organism": {
              "open_prs": ${OPEN_ORGANISM_PRS},
              "recent_eval_passes": ${EVAL_PASS_RATE}
            }
          }
          PERCEPTION_EOF

          # Create latest symlink
          cp ".metrics/perception-${DATE_SLUG}.json" .metrics/latest-perception.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit metrics and create PR
        run: |
          git config user.name "organism[bot]"
          git config user.email "organism[bot]@users.noreply.github.com"
          git add .metrics/
          git diff --cached --quiet && echo "No metric changes" && exit 0
          
          # Create a branch for metrics (cannot push directly to protected main)
          BRANCH="organism/metrics-$(date -u +%Y%m%d-%H%M)"
          git checkout -b "$BRANCH"
          git commit -m "metrics: perception snapshot $(date -u +%Y-%m-%d-%H%M)"
          git push -u origin "$BRANCH"
          
          # Create a PR for the metrics update
          gh pr create --base main --head "$BRANCH" \
            --title "[organism] Perception metrics $(date -u +%Y-%m-%d)" \
            --body "Automated perception snapshot. Metrics only — no code changes."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger Reason workflow
        run: |
          gh workflow run organism-reason.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
