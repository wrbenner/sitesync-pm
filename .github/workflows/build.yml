# =============================================================================
# build.yml — The Autonomous Builder
# =============================================================================
#
# Runs at 7am UTC (2am CDT). Reads TONIGHT.md — a strategic direction document,
# NOT an experiment list. The Builder has FULL AUTONOMY to decide what to build,
# how to build it, and in what order.
#
# This is the organism. It reads the soul (VISION_CORE.md), the direction
# (TONIGHT.md), and the accumulated wisdom (LEARNINGS.md). Then it builds.
#
# Architecture:
#   - SICA-style keep-or-revert safety loop
#   - REA hibernate-and-wake state persistence
#   - Progressive context disclosure (SESSION_BRIEF → full files)
#   - Emergent tool creation (.agent/tools/)
#
# After pushing, dispatches homeostasis + worker-cells for quality ratchets.
# =============================================================================

name: "Autonomous Builder"

on:
  schedule:
    - cron: '0 7 * * *'  # 7am UTC daily
  workflow_dispatch:
    inputs:
      max_turns:
        description: 'Max Claude turns (default 120)'
        default: '120'
      dry_run:
        description: 'Dry run — reason but do not push'
        type: boolean
        default: false

permissions:
  contents: write
  issues: write

jobs:
  build:
    name: "Autonomous Builder"
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.name "Autopoietic Builder"
          git config user.email "builder@sitesync.ai"
          git config pull.rebase true

      - name: Pull latest (catch Perceive-and-Reason push from 3h ago)
        run: git pull origin main --rebase || true

      - name: Check pause state
        run: |
          if grep -q "Status: PAUSED" PAUSE.md 2>/dev/null; then
            echo "::warning::PAUSE.md says PAUSED — aborting run"
            exit 0
          fi

      - name: Verify TONIGHT.md exists and is fresh
        id: tonight
        run: |
          if [ -f "TONIGHT.md" ]; then
            AGE_HOURS=$(python3 -c "
          import os, time
          mtime = os.path.getmtime('TONIGHT.md')
          hours = (time.time() - mtime) / 3600
          print(int(hours))
          ")
            echo "has_tonight=true" >> $GITHUB_OUTPUT
            echo "age_hours=$AGE_HOURS" >> $GITHUB_OUTPUT
            echo "TONIGHT.md found, ${AGE_HOURS}h old"
            if [ "$AGE_HOURS" -gt 26 ]; then
              echo "::warning::TONIGHT.md is >26h old — strategic direction may be stale"
            fi
          else
            echo "has_tonight=false" >> $GITHUB_OUTPUT
            echo "::warning::No TONIGHT.md — Builder will operate in autonomous discovery mode"
          fi

      - name: Baseline metrics
        id: baseline
        run: |
          TS_ERRORS=$(npx tsc --noEmit 2>&1 | grep "error TS" | wc -l | tr -d ' ')
          ANY_COUNT=$(grep -rn "as any\|@ts-ignore" src/ --include="*.ts" --include="*.tsx" 2>/dev/null | grep -v test | wc -l | tr -d ' ')
          MOCK_COUNT=$(grep -rn "Math\.random()\|mockData\|MOCK_" src/ --include="*.ts" --include="*.tsx" 2>/dev/null | grep -v test | wc -l | tr -d ' ')
          BUILD_OK=$(npm run build > /dev/null 2>&1 && echo "PASS" || echo "FAIL")

          echo "ts_errors=$TS_ERRORS" >> $GITHUB_OUTPUT
          echo "any_count=$ANY_COUNT" >> $GITHUB_OUTPUT
          echo "mock_count=$MOCK_COUNT" >> $GITHUB_OUTPUT
          echo "build_ok=$BUILD_OK" >> $GITHUB_OUTPUT
          echo "Baseline: TS=$TS_ERRORS, any=$ANY_COUNT, mock=$MOCK_COUNT, build=$BUILD_OK"

      - name: "Autonomous Build Session"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          MAX_TURNS="${{ github.event.inputs.max_turns || '120' }}"
          HAS_TONIGHT="${{ steps.tonight.outputs.has_tonight }}"

          if [ "$HAS_TONIGHT" = "false" ]; then
            DIRECTION_BLOCK="No TONIGHT.md found. You are in autonomous discovery mode. Read VISION_CORE.md, explore the codebase and live product, identify the highest-leverage work, and build it. Trust your judgment."
          else
            DIRECTION_BLOCK="Read TONIGHT.md now. It contains your strategic direction — the gap analysis, competitive positioning, and success criteria generated by the Perception layer 3 hours ago. This is your compass, not your map. You decide the route."
          fi

          claude \
            --dangerously-skip-permissions \
            --model claude-opus-4-6 \
            --max-turns "$MAX_TURNS" \
            "You are the Autonomous Builder of SiteSync PM — the construction management
          platform that thinks like a 30-year veteran superintendent.

          === IDENTITY ===

          Read your soul first:
            cat VISION_CORE.md

          This is who you are. Every line of code you write serves the superintendent
          with dirt on his hands who needs the answer in 10 seconds.

          === STRATEGIC DIRECTION ===

          ${DIRECTION_BLOCK}

            cat TONIGHT.md 2>/dev/null || echo 'Operating without strategic direction'

          TONIGHT.md gives you DIRECTION — the gaps, the insights, the competitive
          context. It does NOT give you a task list. You have FULL AUTONOMY to decide:
            - What to build
            - In what order
            - How to implement it
            - When to pivot if something is blocked

          You are not executing instructions. You are building a product.

          === CONTEXT (progressive disclosure) ===

          Start with compressed context:
            cat SESSION_BRIEF.md 2>/dev/null || echo 'No session brief'

          If you need more detail:
            - Full rules: cat CLAUDE.md
            - Learnings: cat LEARNINGS.md
            - Evolution ledger: cat EVOLUTION_LEDGER.json
            - Skills: ls .claude/skills/ 2>/dev/null
            - Perception data: cat .perception/app-state.json 2>/dev/null

          === BASELINE STATE ===

          - TypeScript errors: ${{ steps.baseline.outputs.ts_errors }}
          - Unsafe casts: ${{ steps.baseline.outputs.any_count }}
          - Mock data instances: ${{ steps.baseline.outputs.mock_count }}
          - Build: ${{ steps.baseline.outputs.build_ok }}

          === THE BUILD LOOP ===

          For each meaningful change:

          1. THINK — What is the highest-leverage thing I can do right now?
             Apply the Amazon Test: what decision can a construction professional
             now make in 10 seconds that previously took 2 hours?

          2. BUILD — Implement the change. Keep it focused and atomic.

          3. VERIFY — Run quality gates:
               npx tsc --noEmit
               npm run build
               npx vitest run --passWithNoTests 2>/dev/null || true

          4. PRIDE CHECK — Before committing, run the quality conscience:
               git add -A
               python scripts/quality-conscience.py
             Read the output. If it says FAIL, improve your change first.
             You have standards. A superintendent is counting on this code.
             If conscience says PASS or you've addressed its concerns:
               git commit -m 'feat: [description] [autopoietic]'
             If quality gates fail or change regresses:
               git checkout -- .
               git clean -fd
               Log what went wrong, learn from it, move on.

          5. SYNC — Pull before next change:
               git pull --rebase origin main || true

          === AUTONOMY PRINCIPLES ===

          You have EXPLICIT PERMISSION to:
          - Deviate from TONIGHT.md if you discover something more important
          - Fix infrastructure before features (broken foundation = no progress)
          - Create helper tools in .agent/tools/ for recurring patterns
          - Skip low-leverage work even if TONIGHT.md mentions it
          - Spend time understanding before building (reading > guessing)

          When you deviate, log your reasoning:
            echo \"DEVIATION: [reason] -> [action]\" >> /tmp/deviations.log

          === CIRCUIT BREAKERS ===

          1. 3 consecutive reverts in same area -> move to different area
          2. Build broken and 2 fix attempts fail -> revert ALL uncommitted, STOP
          3. Same file fails 2 changes -> skip that file
          4. Running low on turns (>100 used) -> commit all work and STOP

          === RULES (absolute) ===

          - NEVER use 'as any' type casts
          - NEVER add mock/fake/placeholder data to src/
          - NEVER skip the revert step on failure
          - NEVER modify workflow files (.github/workflows/*)
          - ALWAYS commit after each successful change (incremental progress)
          - ALWAYS use typed Supabase queries
          - 56px minimum touch targets (construction gloves)

          === WHAT SUCCESS LOOKS LIKE ===

          Read the success criteria in TONIGHT.md. Those are your north star.

          If TONIGHT.md is missing, success is:
          - Every page a GC visits during the demo shows real data
          - At least one moment that makes the GC say 'I have never seen that'
          - Zero regressions — the product is at least as good as yesterday

          === TOOL CREATION ===

          If you encounter a recurring pattern (3+ times), create a helper:
            1. Write .agent/tools/{tool_name}.py
            2. Add to .agent/tool-registry.json
            3. Tools compound across nights

          === FINAL STEP ===

          When done (or circuit breaker triggers):
            1. git add -A
            2. git commit -m 'report: build session $(date +%Y-%m-%d) [autopoietic][skip ci]'
            3. Write a candid REFLECTION.md: what worked, what failed, what surprised you

          Output <promise>DONE</promise> when complete." || true

      - name: Final push
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git pull --rebase origin main 2>/dev/null || true
          COMMITS=$(git log origin/main..HEAD --oneline 2>/dev/null | wc -l | tr -d ' ')
          if [ "$COMMITS" -gt "0" ]; then
            echo "Creating PR instead of direct push" && git push origin "$BRANCH" 2>&1 && gh pr create --title "[autopoietic] build $(date +%Y-%m-%d)" --body "Autonomous builder output" --base main --head "$BRANCH" || true
            echo "## Autonomous Builder — $(date '+%B %d %Y')" >> $GITHUB_STEP_SUMMARY
            echo "**Commits pushed:** $COMMITS" >> $GITHUB_STEP_SUMMARY
            echo "**Baseline:** ${{ steps.baseline.outputs.ts_errors }} TS errors, ${{ steps.baseline.outputs.any_count }} unsafe casts, ${{ steps.baseline.outputs.mock_count }} mock" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Commits" >> $GITHUB_STEP_SUMMARY
            git log origin/main~${COMMITS}..origin/main --oneline >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          else
            echo "No changes committed this session" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Visual feedback — see what was built
        if: always()
        continue-on-error: true
        run: |
          echo "Waiting 90s for Vercel to deploy..."
          sleep 90
          echo "=== Checking live pages ==="
          PAGES="/ /dashboard /rfis /submittals /budget /daily-log /schedule /punch-list /copilot"
          PASS=0; FAIL=0
          for PAGE in $PAGES; do
            URL="https://sitesync-pm.vercel.app${PAGE}"
            CODE=$(curl -s -o /tmp/page_check.html -w "%{http_code}" --max-time 10 "$URL")
            SIZE=$(wc -c < /tmp/page_check.html 2>/dev/null || echo 0)
            HAS_ERROR=$(grep -ci "error\|500\|404\|not found" /tmp/page_check.html 2>/dev/null || echo 0)
            if [ "$CODE" = "200" ] && [ "$SIZE" -gt 1000 ] && [ "$HAS_ERROR" -lt 3 ]; then
              echo "  ✅ ${PAGE}: HTTP ${CODE}, ${SIZE}B"
              PASS=$((PASS+1))
            else
              echo "  ❌ ${PAGE}: HTTP ${CODE}, ${SIZE}B, errors: ${HAS_ERROR}"
              FAIL=$((FAIL+1))
            fi
          done
          echo ""
          echo "Visual check: $PASS passed, $FAIL failed out of $(echo $PAGES | wc -w | tr -d ' ') pages"
          echo "visual_pass=$PASS" >> $GITHUB_OUTPUT
          echo "visual_fail=$FAIL" >> $GITHUB_OUTPUT

      - name: Trigger downstream workflows
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/actions/workflows/homeostasis.yml/dispatches \
            --method POST --field ref=main 2>/dev/null && echo "Homeostasis dispatched" || true
          gh api repos/${{ github.repository }}/actions/workflows/worker-cells.yml/dispatches \
            --method POST --field ref=main 2>/dev/null && echo "Worker cells dispatched" || true

      - name: Alert if zero commits
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PUSHED=$(git log --since="4 hours ago" --author="Autopoietic Builder" --oneline 2>/dev/null | wc -l | tr -d ' ')
          if [ "$PUSHED" -eq "0" ]; then
            gh issue create \
              --title "[autopoietic] Zero commits — $(date '+%B %d')" \
              --body "The Autonomous Builder ran but produced no commits. Baseline: ${{ steps.baseline.outputs.ts_errors }} TS errors, ${{ steps.baseline.outputs.any_count }} unsafe casts. TONIGHT.md present: ${{ steps.tonight.outputs.has_tonight }}. Check [workflow logs](https://github.com/${{ github.repository }}/actions)." \
              --label "autopoietic" 2>/dev/null || true
          fi
