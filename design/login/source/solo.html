<!doctype html>
<html><head>
<meta charset="utf-8"><title>Solo</title>
<link rel="stylesheet" href="../../../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:#1A1613;}
  body{display:flex;align-items:flex-start;justify-content:center;min-height:100vh;padding:20px;gap:20px;flex-wrap:wrap;}
  .stage{background:#fff;box-shadow:0 20px 60px rgba(0,0,0,0.4);border-radius:6px;overflow:hidden;}
</style>
</head><body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="Direction1Minimal_v1Editorial.jsx"></script>
<script type="text/babel" src="Direction1Minimal_v2.jsx"></script>
<script type="text/babel" src="Direction2Hero.jsx"></script>
<script type="text/babel" src="Direction3Iris.jsx"></script>
<script type="text/babel" src="Direction4Split.jsx"></script>
<script type="text/babel" data-presets="react">
const params = new URLSearchParams(location.search);
const which = params.get('d') || '1d';
const map = {
  '1d': [<MinimalDesktop/>, 1440, 900],
  '1m': [<MinimalMobile/>, 390, 844],
  '1ed': [<MinimalEditorialDesktop/>, 1440, 900],
  '1em': [<MinimalEditorialMobile/>, 390, 844],
  '2d': [<HeroDesktop/>, 1440, 900],
  '2m': [<HeroMobile/>, 390, 844],
  '3d': [<IrisDesktop/>, 1440, 900],
  '3m': [<IrisMobile/>, 390, 844],
  '4d': [<SplitDesktop/>, 1440, 900],
  '4m': [<SplitMobile/>, 390, 844],
};
const [el, w, h] = map[which];
ReactDOM.createRoot(document.getElementById('root')).render(
  <div className="stage" style={{width: w, height: h}}>{el}</div>
);
</script>
</body></html>
